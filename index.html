<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TotoWrap</title>
<style>
/* Custom Font Declaration */
@font-face {
  font-family: 'Alte Haas Grotesk';
  src: url('fonts/AlteHaasGroteskRegular.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --bg:      #263759;
  --bg2:     #3a4b6d;
  --bg3:     #31405d;
  --bg4:     #2c3954;
  --border:  #3d5433;
  --text:    #eec763;
  --dim:     #b8c9a8;
  --accent:  #f0b428;
  --accent2: #ffd04d;
  --red:     #d96060;
  --green:   #8fdf6a;
  --radius:  10px;
  /* Global Font Variable */
  --font-main: 'Alte Haas Grotesk', sans-serif;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body { height: 100%; }

body {
  background-color: var(--bg);
  background-image: url('imgs/bgblu.png');
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
  color: var(--text);
  font-family: var(--font-main);
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior: none;
}

/* Centered Blurred Image Overlay */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 320px;
  background-image: url('imgs/tunacan.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  filter: blur(8px);
  opacity: 0.2;
  z-index: 0;
  pointer-events: none;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 90px;
  min-height: 100vh;
}

.hdr { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 18px 8px; display: flex; justify-content: space-between; align-items: center; }
.hdr-right { text-align: right; display: flex; align-items: center; gap: 8px; }
.hdr-day { font-family: var(--font-main); font-weight: bold; font-size: 2rem; color: var(--accent); letter-spacing: .02em; }
.hdr-clock { font-family: var(--font-main); font-size: .95rem; color: var(--accent); letter-spacing: .05em; }

.nav { position: sticky; top: 66px; z-index: 199; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 11px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-family: var(--font-main); font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s, border-color .2s; }
.nav-btn.on { color: var(--accent); border-bottom-color: var(--accent); }

.sec { padding: 16px; display: none; }
.sec.on { display: block; }

.preview-card { background: rgba(67,84,54,.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.card-lbl { font-family: var(--font-main); font-size: .65rem; font-weight: bold; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }

.row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-name { flex: 1; font-weight: 500; }
.row-time { font-family: var(--font-main); font-size: .9rem; color: var(--accent); }
.row-pts { font-family: var(--font-main); font-weight: bold; font-size: 1.25rem; min-width: 28px; text-align: right; }

.badge { font-family: var(--font-main); font-size: .65rem; font-weight: bold; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.b-alive { background: rgba(106,191,106,.12); color: var(--green); }
.b-out   { background: rgba(217,85,85,.12); color: var(--red); }
.b-win   { background: rgba(240,180,40,.18); color: var(--accent); }
.b-ok    { background: rgba(106,191,106,.12); color: var(--green); }
.b-pend  { background: rgba(120,120,120,.12); color: var(--dim); }
.b-missing { background: rgba(184,201,168,.1); color: var(--dim); font-size: .6rem; font-style: italic; }

.inp-wrap { margin-bottom: 12px; }
.inp-lbl { display: block; font-family: var(--font-main); font-size: .65rem; font-weight: bold; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }

input[type=text], input[type=time], input[type=number], textarea {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--font-main);
  font-size: .95rem;
  outline: none;
  transition: border-color .2s;
}
textarea { resize: vertical; min-height: 140px; line-height: 1.6; }
input:focus, textarea:focus { border-color: var(--accent); }

.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: var(--font-main); font-weight: bold; font-size: .75rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .15s, opacity .15s; }
.btn + .btn { margin-top: 8px; }
.btn-p { background: var(--accent); color: #000; }
.btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-d { background: rgba(217,85,85,.12); color: var(--red); border: 1px solid rgba(217,85,85,.25); }

.big-clock { font-family: var(--font-main); font-weight: bold; font-size: 3.8rem; letter-spacing: .02em; color: var(--accent); text-align: center; line-height: 1; }
.big-clock-lbl { font-family: var(--font-main); font-size: .65rem; font-weight: bold; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); text-align: center; margin-top: 4px; }

.winner-banner { background: linear-gradient(135deg, rgba(240,180,40,.12), rgba(240,180,40,.03)); border: 1px solid rgba(240,180,40,.5); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-bottom: 12px; }
.winner-sub { font-family: var(--font-main); font-size: .65rem; font-weight: bold; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.winner-name { font-family: var(--font-main); font-weight: bold; font-size: 2.8rem; color: var(--accent); line-height: 1; }

.lb-rank { font-family: var(--font-main); font-weight: bold; font-size: 1.8rem; min-width: 32px; color: var(--dim); }
.lb-rank.first { color: var(--accent); }

.day-chip { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: var(--font-main); font-size: .65rem; color: var(--dim); margin-bottom: 8px; }

#toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: var(--font-main); font-size: .8rem; white-space: nowrap; max-width: 90vw; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9000; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-txt { font-family: var(--font-main); font-size: .7rem; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); }

.sync-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
.sync-dot.live { background: var(--green); }
.sync-dot.off { background: var(--red); }
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <img src="imgs/tunacan.png" alt="TotoWrap" style="max-width: 200px;">
    <div class="loading-txt" style="text-align:center;line-height:2.2">
      <span style="color:var(--accent);font-size:.8rem;">Wait for the admin to start today's game</span><br>
      <span style="color:var(--accent);font-style:italic;opacity:.8">"At my signal, unleash hell"</span>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDChGuB5CtWRD0u8j-GFzDOvqsGXdkDNFI",
  authDomain: "totowrapp.firebaseapp.com",
  databaseURL: "https://totowrapp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "totowrapp",
  storageBucket: "totowrapp.firebasestorage.app",
  messagingSenderId: "392119675244",
  appId: "1:392119675244:web:0d2082153198648360eb49"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const STATE_REF = doc(db, "totowrap", "state");

let S = { playerRoster: [], scores: {}, days: [], today: null };
const IS_ADMIN = /[?&]admin/.test(location.search) || location.href.includes('?admin');
let _tab = 'today';
let _clockInterval = null;
let _toastTO = null;
let _writing = false;

async function saveS() {
  _writing = true;
  try { await setDoc(STATE_REF, S); }
  catch(e) { toast("Sync error", "err"); }
  setTimeout(() => { _writing = false; }, 500);
}

function toSec(t) { const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); }
function secToHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function nowSec() { const d=new Date(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function nowHMS() { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }

function parsePaste(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const guesses = [];
  for (const line of lines) {
    const match = line.match(/^(.+?)\s*-\s*(\d{2}:\d{2})$/);
    if (match) guesses.push({ name: match[1].trim(), time: match[2] });
  }
  return guesses;
}

function buildFullGuessList(parsed) {
  const result = [...parsed];
  const submitted = new Set(parsed.map(g => g.name));
  S.playerRoster.forEach(p => { if (!submitted.has(p.name)) result.push({ name: p.name, time: null }); });
  return result;
}

function sortedGuesses(guesses) {
  const withTime = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const missing = guesses.filter(g => !g.time);
  return [...withTime, ...missing];
}

function boundaries(guesses) {
  const valid = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  return valid.slice(0,-1).map((g,i) => {
    const t1 = toSec(valid[i].time), t2 = toSec(valid[i+1].time);
    const mid = Math.floor((t1+t2)/2);
    return { sec: mid, str: secToHMS(mid) };
  });
}

function eliminated(guesses, curSec) {
  const valid = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  const out = new Set();
  b.forEach((bd,i) => { if (curSec > bd.sec) out.add(valid[i].name); });
  return out;
}

function calcWinner(guesses, wrapHHMM) {
  const wrapSec = toSec(wrapHHMM);
  const s = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  let wi = 0;
  b.forEach((bd,i) => { if (wrapSec >= bd.sec) wi = i + 1; });
  const winner = s[wi];
  const points = (wrapHHMM === winner.time.slice(0,5)) ? 3 : 1;
  const winners = s.filter(g => g.time === winner.time);
  return { winner: winner.name, winners, points };
}

function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  const t=nowHMS();
  document.querySelectorAll('.js-clock').forEach(el=>el.textContent=t);
  if(S.today && S.today.guesses.length && !S.today.wrapTime) {
    const cur=nowSec(), out=eliminated(S.today.guesses,cur);
    S.today.guesses.forEach(g=>{
      const el=document.getElementById('st-'+g.name); if(!el) return;
      if(out.has(g.name)){el.className='badge b-out';el.textContent='OUT';}
      else{el.className='badge b-alive';el.textContent='ALIVE';}
    });
  }
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(_toastTO);
  _toastTO=setTimeout(()=>el.className='',3000);
}

function render() {
  const app=document.getElementById('app');
  app.innerHTML = IS_ADMIN ? renderMain() : renderPlayerMain();
  startClock();
  IS_ADMIN ? bindMain() : bindPlayerNav();
}

function renderPlayerMain() {
  const dayNum = S.days.length + (S.today ? 1 : 0);
  return `
    <div class="hdr">
      <div class="hdr-day">Day ${dayNum || '—'}</div>
      <div class="hdr-right"><div class="hdr-clock js-clock">--:--:--</div><span class="sync-dot ${S.today?.wrapTime?'off':'live'}"></span></div>
    </div>
    <nav class="nav">
      ${['today', 'board', 'history'].map(t => `<button class="nav-btn ${_tab===t?'on':''}" data-tab="${t}">${t}</button>`).join('')}
    </nav>
    <div class="sec ${_tab==='today'?'on':''}">${renderPlayerToday()}</div>
    <div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
    <div class="sec ${_tab==='history'?'on':''}">${renderHistory()}</div>
  `;
}

function renderPlayerToday() {
  const t = S.today;
  if (!t) return '<div class="empty">No active game today</div>';
  if (t.wrapTime) {
    return `
      <div class="winner-banner">
        <div class="winner-sub">🎬 Today's Winner</div>
        <div class="winner-name">${t.winner}</div>
      </div>
      <div class="card"><div class="card-lbl">Results</div>
        ${sortedGuesses(t.guesses).map(g => `<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time||'--'}</div>${g.name===t.winner?`<div class="badge b-win">+${t.points}pt</div>`:''}</div>`).join('')}
      </div>`;
  }
  const sg = sortedGuesses(t.guesses || []);
  if (!sg.some(g => g.time)) return '<div class="empty">Waiting for guesses...</div>';
  return `
    <div class="card"><div class="big-clock js-clock">--:--:--</div><div class="big-clock-lbl">Live Time</div></div>
    <div class="card"><div class="card-lbl">Player Status</div>
      ${sg.map(g => `<div class="row"><div class="row-name">${g.name}</div>${g.time?`<div class="row-time">${g.time}</div><div class="badge" id="st-${g.name}">...</div>`:`<div class="badge b-missing">Missing</div>`}</div>`).join('')}
    </div>`;
}

function renderMain() {
  return `
    <div class="hdr"><div class="hdr-day">Admin Panel</div><div class="hdr-right"><div class="hdr-clock js-clock">--:--:--</div></div></div>
    <nav class="nav">${['today', 'board', 'settings'].map(t => `<button class="nav-btn ${_tab===t?'on':''}" data-tab="${t}">${t}</button>`).join('')}</nav>
    <div class="sec ${_tab==='today'?'on':''}">${renderAdminToday()}</div>
    <div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
    <div class="sec ${_tab==='settings'?'on':''}">${renderSettings()}</div>
  `;
}

function renderAdminToday() {
  const t = S.today;
  if (!t) return '<button class="btn btn-p" id="new-day-btn">Start Today</button>';
  if (t.wrapTime) return '<button class="btn btn-p" id="new-day-btn">Start Next Day</button>';
  if (t.guesses.length > 0) {
    return `<div class="card"><div class="card-lbl">Wrap Time</div><input type="time" id="wrap-inp"><button class="btn btn-p mt12" id="wrap-btn">Confirm Wrap</button></div>`;
  }
  return `<div class="card"><div class="card-lbl">Paste Guesses</div><textarea id="paste-inp"></textarea><button class="btn btn-p mt12" id="parse-btn">Confirm Guesses</button></div>`;
}

function renderBoard() {
  const pl=[...S.playerRoster].sort((a,b)=>(S.scores[b.name]||0)-(S.scores[a.name]||0));
  return `<div class="card"><div class="card-lbl">Standings</div>${pl.map((p,i)=>`<div class="row"><div class="lb-rank ${i===0?'first':''}">${i+1}</div><div class="row-name">${p.name}</div><div class="row-pts">${S.scores[p.name]||0}</div></div>`).join('')}</div>`;
}

function renderHistory() {
  return S.days.length ? S.days.map(d => `<div class="card">${d.date}: ${d.winner} (+${d.points})</div>`).join('') : '<div class="empty">No history</div>';
}

function renderSettings() {
  return `<div class="card"><div class="card-lbl">Players</div>${S.playerRoster.map((p,i)=>`<div class="row"><input type="text" value="${p.name}" onchange="updatePlayer(${i}, this.value)"><input type="number" value="${S.scores[p.name]||0}" style="width:60px" onchange="updateScore('${p.name}', this.value)"></div>`).join('')}</div><button class="btn btn-d" onclick="resetGame()">Reset All Data</button>`;
}

function bindPlayerNav() { document.querySelectorAll('.nav-btn').forEach(b => b.onclick = () => { _tab = b.dataset.tab; render(); }); }
function bindMain() {
  bindPlayerNav();
  document.getElementById('new-day-btn')?.addEventListener('click', () => { S.today={date:new Date().toLocaleDateString(), guesses:[], wrapTime:null}; saveS(); });
  document.getElementById('parse-btn')?.addEventListener('click', () => {
    const parsed = parsePaste(document.getElementById('paste-inp').value);
    parsed.forEach(g => { if(!S.playerRoster.find(p=>p.name===g.name)) S.playerRoster.push({name:g.name}); });
    S.today.guesses = buildFullGuessList(parsed);
    saveS();
  });
  document.getElementById('wrap-btn')?.addEventListener('click', () => {
    const t = document.getElementById('wrap-inp').value;
    const res = calcWinner(S.today.guesses, t);
    S.today.wrapTime = t; S.today.winner = res.winner; S.today.points = res.points;
    res.winners.forEach(w => S.scores[w.name] = (S.scores[w.name]||0) + res.points);
    S.days.push({...S.today});
    saveS();
  });
}

window.updatePlayer = (i, val) => { S.playerRoster[i].name = val; saveS(); };
window.updateScore = (name, val) => { S.scores[name] = parseInt(val); saveS(); };
window.resetGame = () => { if(confirm('Reset?')) { S={playerRoster:[], scores:{}, days:[], today:null}; saveS(); } };

onSnapshot(STATE_REF, (snap) => {
  if(_writing) return;
  if(snap.exists()) S = snap.data();
  render();
});
</script>
</body>
</html>
