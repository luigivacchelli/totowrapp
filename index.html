<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TotoWrap</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #586B45;
  --bg2:     #4d5f3c;
  --bg3:     #435436;
  --bg4:     #3a4a2f;
  --border:  #3d5433;
  --text:    #f0ead8;
  --dim:     #b8c9a8;
  --accent:  #f0b428;
  --accent2: #ffd04d;
  --red:     #d96060;
  --green:   #6abf6a;
  --radius:  10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background-color: #3d6b45; background-image: url('BG_PLACEHOLDER'); background-size: cover; background-attachment: fixed; background-position: center; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.4; overscroll-behavior: none; }
#app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; }
.hdr { position: sticky; top: 0; z-index: 200; background: rgba(88,107,69,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 14px 18px 12px; display: flex; justify-content: space-between; align-items: center; }
.hdr-day { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); letter-spacing: .02em; }
.hdr-right { text-align: right; display: flex; align-items: center; gap: 8px; }
.hdr-clock { font-family: 'DM Mono', monospace; font-size: .95rem; color: var(--text); letter-spacing: .05em; }
.sync-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); transition: background .3s; }
.sync-dot.off { background: var(--red); }
.nav { position: sticky; top: 66px; z-index: 199; background: rgba(88,107,69,.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 11px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s, border-color .2s; }
.nav-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.sec { padding: 16px; display: none; }
.sec.on { display: block; }
.card { background: rgba(29,36,25,.85); backdrop-filter: blur(8px); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.card-lbl { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-name { flex: 1; font-weight: 500; }
.row-time { font-family: 'DM Mono', monospace; font-size: .88rem; color: var(--accent); }
.row-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; min-width: 28px; text-align: right; }
.badge { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.b-alive { background: rgba(106,191,106,.15); color: var(--green); }
.b-out   { background: rgba(217,85,85,.15); color: var(--red); }
.b-win   { background: rgba(240,180,40,.2); color: var(--accent); }
.b-missing { background: rgba(184,201,168,.1); color: var(--dim); font-size: .55rem; font-style: italic; }
.inp-wrap { margin-bottom: 12px; }
.inp-lbl { display: block; font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
input[type=text], input[type=time], textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: .9rem; outline: none; transition: border-color .2s; }
textarea { resize: vertical; min-height: 140px; font-size: .85rem; line-height: 1.6; }
input:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--dim); }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .15s, opacity .15s; }
.btn + .btn { margin-top: 8px; }
.btn:disabled { opacity: .4; cursor: default; }
.btn-p { background: var(--accent); color: #000; font-weight: 500; }
.btn-p:hover:not(:disabled) { background: var(--accent2); }
.btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-s:hover { background: var(--bg4); }
.btn-d { background: rgba(217,85,85,.15); color: var(--red); border: 1px solid rgba(217,85,85,.3); }
.btn-sm { padding: 8px 14px; font-size: .65rem; }
.big-clock { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; letter-spacing: .04em; color: var(--accent); text-align: center; line-height: 1; }
.big-clock-lbl { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); text-align: center; margin-top: 4px; }
.winner-banner { background: linear-gradient(135deg, rgba(240,180,40,.14), rgba(240,180,40,.04)); border: 1px solid rgba(240,180,40,.6); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-bottom: 12px; }
.winner-sub { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.winner-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); letter-spacing: .04em; line-height: 1; }
.winner-pts { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--dim); margin-top: 4px; }
.setup-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.setup-logo { max-width: 260px; width: 85%; margin-bottom: 8px; }
.setup-tag { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); margin-bottom: 36px; }
.setup-card { background: rgba(29,36,25,.9); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 100%; max-width: 400px; }
.setup-step { font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; margin-bottom: 16px; }
.tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.tag { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-family: 'DM Mono', monospace; font-size: .72rem; display: flex; align-items: center; gap: 6px; }
.tag-x { color: var(--red); cursor: pointer; font-size: 1.1rem; line-height: 1; }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; min-width: 32px; color: var(--dim); }
.lb-rank.first { color: var(--accent); }
.hist-row { padding: 10px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: .75rem; display: flex; align-items: center; gap: 8px; }
.hist-row:last-child { border-bottom: none; }
.hist-day { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--accent); min-width: 40px; }
.hist-winner { flex: 1; font-weight: 500; }
.hist-data { color: var(--dim); font-size: .68rem; }
.bnd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: .72rem; }
.bnd-row:last-child { border-bottom: none; }
.bnd-range { color: var(--dim); font-size: .65rem; }
#toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: 'DM Mono', monospace; font-size: .72rem; white-space: nowrap; max-width: 90vw; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9000; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: var(--accent); color: var(--accent); }
#toast.err { border-color: var(--red); color: var(--red); }
.preview-card { background: rgba(67,84,54,.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
.mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; } .mt16 { margin-top: 16px; }
.dim { color: var(--dim); } .mono { font-family: 'DM Mono', monospace; font-size: .75rem; }
.empty { text-align: center; padding: 44px 20px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--dim); letter-spacing: .1em; }
.center { text-align: center; } .accent { color: var(--accent); } .red { color: var(--red); }
.loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; }
.loading-screen img { max-width: 200px; }
.loading-txt { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
.flex-row { display: flex; gap: 8px; }
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <img src="LOGO_PLACEHOLDER" alt="TotoWrap">
    <div class="loading-txt" style="text-align:center;line-height:2.2">
      <span style="color:var(--accent);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase">Connecting…</span>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

// ── Firebase config ──────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyDChGuB5CtWRD0u8j-GFzDOvqsGXdkDNFI",
  authDomain: "totowrapp.firebaseapp.com",
  databaseURL: "https://totowrapp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "totowrapp",
  storageBucket: "totowrapp.firebasestorage.app",
  messagingSenderId: "392119675244",
  appId: "1:392119675244:web:0d2082153198648360eb49"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const STATE_REF = doc(db, "totowrap", "state");

// ── State ────────────────────────────────────────────────────────
let S = {
  setup: false,
  playerRoster: [],  // Master list of all players [{name}]
  scores: {},        // {name: totalPoints}
  days: [],          // [{date, guesses:[{name,time}], wrapTime, winner, points}]
  today: null        // Current day or null
};

const IS_ADMIN = /[?&]admin/.test(location.search) || location.href.includes('?admin');
let _tab = 'today';
let _clockInterval = null;
let _toastTO = null;
let _writing = false;

// ── Save ─────────────────────────────────────────────────────────
async function saveS() {
  _writing = true;
  try { await setDoc(STATE_REF, S); } 
  catch(e) { console.error("Save error:", e); toast("Sync error", "err"); }
  setTimeout(() => { _writing = false; }, 500);
}

// ── Time utils ───────────────────────────────────────────────────
function toSec(t) { const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); }
function secToHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function nowSec() { const d=new Date(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function nowHMS() { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function midSec(a,b) { return Math.floor((a+b)/2); }

// Sort guesses by time, missing players always at the end
function sortedGuesses(guesses, allPlayers) {
  const withTime = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const missing = guesses.filter(g => !g.time);
  return [...withTime, ...missing];
}

function boundaries(guesses) {
  const s = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  return s.slice(0,-1).map((g,i) => {
    const t1 = toSec(s[i].time), t2 = toSec(s[i+1].time), mid = midSec(t1, t2);
    return { nameA: s[i].name, nameB: s[i+1].name, sec: mid, str: secToHMS(mid) };
  });
}

function eliminated(guesses, curSec) {
  const s = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  const out = new Set();
  b.forEach((bd,i) => { if (curSec > bd.sec) out.add(s[i].name); });
  return out;
}

function calcWinner(guesses, wrapHHMM) {
  const wrapSec = toSec(wrapHHMM);
  const s = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  let wi = 0;
  b.forEach((bd,i) => { if (wrapSec >= bd.sec) wi = i + 1; });
  const winner = s[wi];
  const points = (wrapHHMM === winner.time.slice(0,5)) ? 3 : 1;
  return { winner, points };
}

// ── Parse paste input ────────────────────────────────────────────
function parsePaste(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const guesses = [];
  for (const line of lines) {
    const match = line.match(/^(.+?)\s*-\s*(\d{2}:\d{2})$/);
    if (match) {
      guesses.push({ name: match[1].trim(), time: match[2] });
    }
  }
  return guesses;
}

// Build full guess list with missing players
function buildFullGuessList(parsed) {
  const result = [];
  const submitted = new Set(parsed.map(g => g.name));
  
  // Add parsed guesses
  parsed.forEach(g => result.push(g));
  
  // Add missing players
  S.playerRoster.forEach(p => {
    if (!submitted.has(p.name)) {
      result.push({ name: p.name, time: null });
    }
  });
  
  return result;
}

// ── Clock ────────────────────────────────────────────────────────
function startClock() {
  if (_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  const t = nowHMS();
  document.querySelectorAll('.js-clock').forEach(el => el.textContent = t);
  refreshStatusBadges();
}

function refreshStatusBadges() {
  if (!S.today || !S.today.guesses.length || S.today.wrapTime) return;
  const cur = nowSec();
  const out = eliminated(S.today.guesses, cur);
  S.today.guesses.forEach(g => {
    if (!g.time) return; // Skip missing players
    const el = document.getElementById('st-' + g.name);
    if (!el) return;
    if (out.has(g.name)) { el.className = 'badge b-out'; el.textContent = 'OUT'; }
    else { el.className = 'badge b-alive'; el.textContent = 'ALIVE'; }
  });
}

// ── Toast ────────────────────────────────────────────────────────
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `show ${type}`;
  clearTimeout(_toastTO);
  _toastTO = setTimeout(() => el.className = '', 3000);
}

// ── Render ───────────────────────────────────────────────────────
const LOGO_DATA = "LOGO_PLACEHOLDER";

function render() {
  const app = document.getElementById('app');
  
  if (IS_ADMIN) {
    if (!S.setup) { app.innerHTML = renderSetup(); bindSetup(); return; }
    app.innerHTML = renderAdminMain();
    startClock();
    bindAdminMain();
  } else {
    if (!S.setup) { app.innerHTML = renderPlayerWaiting(); return; }
    app.innerHTML = renderPlayerMain();
    startClock();
    bindPlayerMain();
  }
}

// ─── PLAYER VIEWS ────────────────────────────────────────────────
function renderPlayerWaiting() {
  return `
<div class="loading-screen">
  <img src="${LOGO_DATA}" alt="TotoWrap" style="max-width:200px;margin-bottom:16px;">
  <div class="loading-txt" style="text-align:center;line-height:2.2">
    <span style="color:var(--accent);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase">Wait for the admin to start today's game</span><br>
    <span style="color:var(--accent);font-style:italic;font-size:.7rem;opacity:.8">"At my signal, unleash hell"</span>
  </div>
</div>`;
}

function renderPlayerMain() {
  const dayNum = S.days.length + (S.today ? 1 : 0);
  const dotClass = (S.today && S.today.wrapTime) ? 'off' : '';
  
  return `
<div class="hdr">
  <div class="hdr-day">Day ${dayNum || '—'}</div>
  <div class="hdr-right">
    <div class="hdr-clock js-clock">--:--:--</div>
    <div class="sync-dot ${dotClass}"></div>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderPlayerToday()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderPlayerBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderPlayerHistory()}</div>
`;
}

function renderPlayerToday() {
  const t = S.today;
  
  if (!t) {
    const last = S.days.length ? S.days[S.days.length-1] : null;
    return `
      <div class="empty">No active game today</div>
      ${last ? `<p class="mono dim center">Last wrap: <span class="accent">${last.wrapTime}</span> · ${last.winner} won</p>` : ''}
    `;
  }
  
  // Winner announced
  if (t.wrapTime) {
    const sg = sortedGuesses(t.guesses, S.playerRoster);
    return `
      <div class="winner-banner">
        <div class="winner-sub">🎬 Today's Winner</div>
        <div class="winner-name">${t.winner}</div>
        <div class="winner-pts">+${t.points} pt · Bet ${t.guesses.find(g => g.name === t.winner).time} · Wrap ${t.wrapTime}</div>
      </div>
      <div class="card"><div class="card-lbl">Results</div>
        ${sg.map(g => `
          <div class="row">
            <div class="row-name">${g.name}</div>
            ${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}
            ${g.name === t.winner ? `<div class="badge b-win">+${t.points}pt</div>` : ''}
          </div>`).join('')}
      </div>
    `;
  }
  
  // Live game
  const allSubmitted = t.guesses.every(g => g.time || S.playerRoster.find(p => p.name === g.name));
  const sg = sortedGuesses(t.guesses, S.playerRoster);
  
  if (!allSubmitted || !t.guesses.some(g => g.time)) {
    return `<div class="card"><div class="card-lbl">Collecting Guesses</div>
      ${sg.map(g => `
        <div class="row">
          <div class="row-name">${g.name}</div>
          ${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="mono dim" style="font-size:.7rem">Pending...</div>`}
        </div>`).join('')}
    </div>`;
  }
  
  const cur = nowSec();
  const out = eliminated(t.guesses, cur);
  const bnds = boundaries(t.guesses);
  const withTime = sg.filter(g => g.time);
  
  return `
    <div class="card">
      <div class="big-clock js-clock">--:--:--</div>
      <div class="big-clock-lbl">Live Time</div>
    </div>
    <div class="card"><div class="card-lbl">Player Status</div>
      ${sg.map(g => `
        <div class="row">
          <div class="row-name">${g.name}</div>
          ${g.time ? `
            <div class="row-time">${g.time}</div>
            <div class="badge ${out.has(g.name) ? 'b-out' : 'b-alive'}" id="st-${g.name}">
              ${out.has(g.name) ? 'OUT' : 'ALIVE'}
            </div>
          ` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}
        </div>`).join('')}
    </div>
    <div class="card"><div class="card-lbl">Territory Boundaries</div>
      ${withTime.map((g,i) => {
        const lo = i===0 ? '00:00:00' : bnds[i-1].str;
        const hi = i===withTime.length-1 ? '23:59:59' : bnds[i].str;
        return `<div class="bnd-row"><span>${g.name}</span><span class="bnd-range">${lo} → ${hi}</span></div>`;
      }).join('')}
    </div>
  `;
}

function renderPlayerBoard() {
  const pl = [...S.playerRoster].sort((a,b) => (S.scores[b.name]||0) - (S.scores[a.name]||0));
  if (!pl.length) return '<div class="empty">No players yet</div>';
  
  return `
    <div class="card"><div class="card-lbl">Standings</div>
      ${pl.map((p,i) => `
        <div class="row">
          <div class="lb-rank ${i===0?'first':''}">${i+1}</div>
          <div class="row-name">${p.name}</div>
          <div class="row-pts accent">${S.scores[p.name]||0} <span class="mono dim" style="font-size:.65rem">pts</span></div>
        </div>`).join('')}
    </div>
  `;
}

function renderPlayerHistory() {
  if (!S.days.length) return '<div class="empty">No history yet</div>';
  
  return `
    <div class="card"><div class="card-lbl">Past Days</div>
      ${[...S.days].reverse().map((d,i) => {
        const dayNum = S.days.length - i;
        const winGuess = d.guesses.find(g => g.name === d.winner);
        return `
          <div class="hist-row">
            <div class="hist-day">${dayNum}</div>
            <div class="hist-winner">${d.winner}</div>
            <div class="hist-data">+${d.points}pt · ${winGuess?.time || '—'} → ${d.wrapTime}</div>
          </div>`;
      }).join('')}
    </div>
  `;
}

function bindPlayerMain() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { _tab = btn.dataset.tab; render(); });
  });
}

// ─── ADMIN VIEWS ─────────────────────────────────────────────────
function renderSetup() {
  const tags = S.playerRoster.map(p => 
    `<div class="tag">${p.name}<span class="tag-x" data-rm="${p.name}">×</span></div>`
  ).join('');
  
  return `
<div class="setup-wrap">
  <img src="${LOGO_DATA}" alt="TotoWrap" class="setup-logo">
  <div class="setup-tag">The Movie Set Wrap Time Game</div>
  <div class="setup-card">
    <div class="setup-step">Admin Setup</div>
    <div class="setup-title">Add Player Roster</div>
    ${S.playerRoster.length ? `<div class="tags">${tags}</div>` : ''}
    <div class="flex-row mt8">
      <input type="text" id="pname" placeholder="Player name…" maxlength="20" autocomplete="off">
      <button class="btn btn-s btn-sm" id="add-btn">Add</button>
    </div>
    <div class="mt12">
      <button class="btn btn-p" id="start-btn" ${S.playerRoster.length < 2 ? 'disabled' : ''}>
        Start the Game →
      </button>
    </div>
    ${S.playerRoster.length < 2 ? `<p class="mono dim center mt8">Add at least 2 players</p>` : ''}
  </div>
</div>`;
}

function bindSetup() {
  document.getElementById('add-btn')?.addEventListener('click', addPlayer);
  document.getElementById('pname')?.addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  document.getElementById('start-btn')?.addEventListener('click', finishSetup);
  document.querySelectorAll('.tag-x').forEach(el => {
    el.addEventListener('click', () => removePlayer(el.dataset.rm));
  });
}

function renderAdminMain() {
  const dayNum = S.days.length + (S.today ? 1 : 0);
  const dotClass = (S.today && S.today.wrapTime) ? 'off' : '';
  
  return `
<div class="hdr">
  <div class="hdr-day">Day ${dayNum || '—'}</div>
  <div class="hdr-right">
    <div class="hdr-clock js-clock">--:--:--</div>
    <div class="sync-dot ${dotClass}"></div>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
  <button class="nav-btn ${_tab==='settings'?'on':''}" data-tab="settings">⚙</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderAdminToday()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderPlayerBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderPlayerHistory()}</div>
<div class="sec ${_tab==='settings'?'on':''}">${renderAdminSettings()}</div>
`;
}

function renderAdminToday() {
  const t = S.today;
  
  // No active day
  if (!t) {
    return `
      <div class="card">
        <div class="card-lbl">Start New Day</div>
        <button class="btn btn-p" id="new-day-btn">🎬 Start Today's Game</button>
      </div>
    `;
  }
  
  // Wrap submitted
  if (t.wrapTime) {
    const sg = sortedGuesses(t.guesses, S.playerRoster);
    return `
      <div class="winner-banner">
        <div class="winner-sub">🎬 Today's Winner</div>
        <div class="winner-name">${t.winner}</div>
        <div class="winner-pts">+${t.points} pt · Bet ${t.guesses.find(g => g.name === t.winner).time} · Wrap ${t.wrapTime}</div>
      </div>
      <div class="card"><div class="card-lbl">Results</div>
        ${sg.map(g => `
          <div class="row">
            <div class="row-name">${g.name}</div>
            ${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}
            ${g.name === t.winner ? `<div class="badge b-win">+${t.points}pt</div>` : ''}
          </div>`).join('')}
      </div>
      <button class="btn btn-p" id="new-day-btn">Start Next Day →</button>
    `;
  }
  
  // Guesses submitted, waiting for wrap
  if (t.guesses && t.guesses.length > 0) {
    const cur = nowSec();
    const out = eliminated(t.guesses, cur);
    const sg = sortedGuesses(t.guesses, S.playerRoster);
    const bnds = boundaries(t.guesses);
    const withTime = sg.filter(g => g.time);
    
    return `
      <div class="card">
        <div class="big-clock js-clock">--:--:--</div>
        <div class="big-clock-lbl">Live Time</div>
      </div>
      <div class="card"><div class="card-lbl">Player Status</div>
        ${sg.map(g => `
          <div class="row">
            <div class="row-name">${g.name}</div>
            ${g.time ? `
              <div class="row-time">${g.time}</div>
              <div class="badge ${out.has(g.name) ? 'b-out' : 'b-alive'}" id="st-${g.name}">
                ${out.has(g.name) ? 'OUT' : 'ALIVE'}
              </div>
            ` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}
          </div>`).join('')}
      </div>
      <div class="card"><div class="card-lbl">Territory Boundaries</div>
        ${withTime.map((g,i) => {
          const lo = i===0 ? '00:00:00' : bnds[i-1].str;
          const hi = i===withTime.length-1 ? '23:59:59' : bnds[i].str;
          return `<div class="bnd-row"><span>${g.name}</span><span class="bnd-range">${lo} → ${hi}</span></div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-lbl">Enter Official Wrap Time</div>
        <div class="inp-wrap">
          <label class="inp-lbl">Wrap Time (HH:MM)</label>
          <input type="time" id="wrap-inp">
        </div>
        <button class="btn btn-p" id="wrap-btn">Confirm Wrap ✓</button>
      </div>
    `;
  }
  
  // Fresh day, paste guesses
  return `
    <div class="card">
      <div class="card-lbl">Paste Today's Guesses</div>
      <p class="mono dim" style="font-size:.7rem;margin-bottom:10px">Format: Name - HH:MM (one per line)</p>
      <textarea id="paste-inp" placeholder="Luigi - 18:30
Daniela - 19:15
Marco - 17:45"></textarea>
      <button class="btn btn-p mt12" id="parse-btn">Preview Guesses →</button>
    </div>
  `;
}

function renderAdminSettings() {
  return `
    <div class="card">
      <div class="card-lbl">Player Roster</div>
      ${S.playerRoster.map(p => `
        <div class="row">
          <div class="row-name">${p.name}</div>
          <div class="mono dim">${S.scores[p.name]||0} pts</div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-lbl">Danger Zone</div>
      <p class="mono dim mt8" style="margin-bottom:12px">This will erase all data permanently.</p>
      <button class="btn btn-d" id="reset-btn">Reset Entire Game</button>
    </div>
  `;
}

function bindAdminMain() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { _tab = btn.dataset.tab; render(); });
  });
  
  document.getElementById('new-day-btn')?.addEventListener('click', startNewDay);
  document.getElementById('parse-btn')?.addEventListener('click', showPreview);
  document.getElementById('wrap-btn')?.addEventListener('click', submitWrap);
  document.getElementById('reset-btn')?.addEventListener('click', resetGame);
}

// ─── ADMIN ACTIONS ───────────────────────────────────────────────
function addPlayer() {
  const inp = document.getElementById('pname');
  const name = inp.value.trim();
  if (!name) return;
  if (S.playerRoster.find(p => p.name.toLowerCase() === name.toLowerCase())) {
    toast('Player already exists', 'err'); return;
  }
  S.playerRoster.push({ name });
  S.scores[name] = 0;
  inp.value = ''; saveS(); render();
  document.getElementById('pname')?.focus();
}

function removePlayer(name) {
  S.playerRoster = S.playerRoster.filter(p => p.name !== name);
  delete S.scores[name];
  saveS(); render();
}

function finishSetup() {
  if (S.playerRoster.length < 2) return;
  S.setup = true;
  saveS(); render();
}

function startNewDay() {
  if (S.today && S.today.wrapTime) {
    const alreadySaved = S.days.find(d => d.date === S.today.date && d.wrapTime === S.today.wrapTime);
    if (!alreadySaved) S.days.push({ ...S.today });
  }
  
  S.today = {
    date: new Date().toLocaleDateString('en-GB'),
    guesses: [],
    wrapTime: null,
    winner: null,
    points: null
  };
  
  saveS(); render();
}

function showPreview() {
  const inp = document.getElementById('paste-inp');
  const text = inp?.value || '';
  if (!text.trim()) { toast('Paste guesses first', 'err'); return; }
  
  const parsed = parsePaste(text);
  if (!parsed.length) { toast('No valid guesses found', 'err'); return; }
  
  const fullList = buildFullGuessList(parsed);
  const sorted = sortedGuesses(fullList, S.playerRoster);
  
  // Show preview
  const app = document.getElementById('app');
  const currentContent = app.innerHTML;
  
  app.innerHTML = `
<div class="hdr">
  <div class="hdr-day">Preview</div>
  <div class="hdr-right">
    <div class="hdr-clock js-clock">--:--:--</div>
  </div>
</div>
<div style="padding:16px">
  <div class="card">
    <div class="card-lbl">Confirm These Guesses</div>
    <div class="preview-card">
      ${sorted.map(g => `
        <div class="row">
          <div class="row-name">${g.name}</div>
          ${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}
        </div>`).join('')}
    </div>
    <p class="mono dim" style="font-size:.7rem;margin-top:10px">
      ${parsed.length} players submitted · ${fullList.length - parsed.length} missing
    </p>
  </div>
  <button class="btn btn-p" id="confirm-btn">✓ Looks Good — Start Day</button>
  <button class="btn btn-s" id="cancel-btn">← Go Back</button>
</div>
  `;
  
  startClock();
  
  document.getElementById('confirm-btn')?.addEventListener('click', () => {
    S.today.guesses = fullList;
    saveS();
    toast('Day started!', 'ok');
    render();
  });
  
  document.getElementById('cancel-btn')?.addEventListener('click', () => {
    render();
  });
}

function submitWrap() {
  const inp = document.getElementById('wrap-inp');
  if (!inp?.value) { toast('Enter wrap time', 'err'); return; }
  
  const wrapHHMM = inp.value;
  const validGuesses = S.today.guesses.filter(g => g.time);
  
  if (!validGuesses.length) { toast('No valid guesses to score', 'err'); return; }
  
  const { winner, points } = calcWinner(S.today.guesses, wrapHHMM);
  
  S.today.wrapTime = wrapHHMM;
  S.today.winner = winner.name;
  S.today.points = points;
  S.scores[winner.name] = (S.scores[winner.name] || 0) + points;
  
  saveS();
  toast(`${winner.name} wins +${points} pt! 🎬`, 'ok');
  render();
}

function resetGame() {
  if (!confirm('Reset the entire game? This cannot be undone.')) return;
  S = { setup: false, playerRoster: [], scores: {}, days: [], today: null };
  saveS(); render();
}

function exportCSV() {
  const rows = [['Rank','Player','Points']];
  [...S.playerRoster]
    .sort((a,b) => (S.scores[b.name]||0) - (S.scores[a.name]||0))
    .forEach((p,i) => rows.push([i+1, p.name, S.scores[p.name]||0]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'totowrap_scores.csv';
  a.click();
}

// ── Init ─────────────────────────────────────────────────────────
if (!IS_ADMIN) render();

onSnapshot(STATE_REF, (snap) => {
  if (_writing) return;
  if (snap.exists()) {
    S = snap.data();
  } else {
    S = { setup: false, playerRoster: [], scores: {}, days: [], today: null };
  }
  render();
}, (err) => {
  console.error("Firestore error:", err);
});
</script>
