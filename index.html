<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TotoWrap</title>
<link rel="apple-touch-icon" href="imgs/tunacan.png">
<meta name="apple-mobile-web-app-title" content="TotoWrap">
<style>
/* Custom Font Declaration */
@font-face {
  font-family: 'Alte Haas Grotesk';
  src: url('fonts/AlteHaasGroteskBold.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --bg:      #263759;
  --bg2:     #3a4b6d;
  --bg3:     #31405d;
  --bg4:     #2c3954;
  --border:  #3d5433;
  --text:    #eec763;
  --dim:     #b8c9a8;
  --accent:  #f0b428;
  --accent2: #ffd04d;
  --red:     #d96060;
  --green:   #8fdf6a;
  --radius:  10px;
  --bg-glass: rgba(58, 75, 109, 0.45);      /* Semi-transparent blue */
  --border-glass: rgba(238, 199, 99, 0.15); /* Subtle gold tint */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  background-color: var(--bg);
  background-size: repeat;
  background-attachment: fixed;
  background-position: center;
  color: var(--text);
  font-family: 'Alte Haas Grotesk', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior: none;
}

/* Centered Blurred Image Overlay */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 320px;
  background-image: url('imgs/tunacan.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  z-index: -1;
  pointer-events: none;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 40px;
  min-height: 100vh;
}

.hdr { position: sticky; top: 0; z-index: 200; background: var(--bg);  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-glass); border-bottom: 1px solid var(--border); padding: 10px 18px 8px; display: flex; justify-content: space-between; align-items: center; height: 50px}
.hdr-right { font-family: 'Alte Haas Grotesk'; text-align: right; display: flex; align-items: center; gap: 4px; flex: 1; justify-content: flex-end; min-width:0; }
.hdr-day { font-family: 'Alte Haas Grotesk', sans-serif; font-size: 0.90rem; color: var(--accent); letter-spacing: .02em; flex: 1; }

/* 3D LOGO STYLES */
.logo-3d-container {
  height: 48px;
  width: 88px;
  perspective: 1000px;
  margin: 0 10px;
  flex-shrink: 0;
}

.logo-3d-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  object-fit: contain;
  opacity: 0;
}

.face-2, .face-3 , .face-4 {
  backface-visibility: visible;
  transform: scaleX(-1); 
}

.face-1 { animation: f1-step0 12.5s linear forwards, loop-standard 12s linear 12.5s infinite; }
.face-2 { animation: f2-step0 12.5s linear forwards, loop-mirrored 12s linear 12.5s infinite; animation-delay: 0s, 15.5s; }
.face-3 { animation: f3-step0 12.5s linear forwards, loop-mirrored 12s linear 12.5s infinite; animation-delay: 0s, 18.5s; }
.face-4 { animation: f4-step0 12.5s linear forwards, loop-mirrored 12s linear 12.5s infinite; animation-delay: 0s, 21.5s; }

@keyframes f1-step0 { 0%, 16% { opacity: 1; transform: rotateY(0deg); } 28% { opacity: 1; transform: rotateY(90deg); } 28.1%, 100% { opacity: 0; } }
@keyframes f2-step0 { 0%, 28% { opacity: 0; transform: rotateY(90deg) scaleX(-1); } 28.1% { opacity: 1; transform: rotateY(90deg) scaleX(-1); } 52% { opacity: 1; transform: rotateY(270deg) scaleX(-1); } 52.1%, 100% { opacity: 0; } }
@keyframes f3-step0 { 0%, 52% { opacity: 0; transform: rotateY(270deg) scaleX(-1); } 52.1% { opacity: 1; transform: rotateY(270deg) scaleX(-1); } 76% { opacity: 1; transform: rotateY(450deg) scaleX(-1); } 76.1%, 100% { opacity: 0; } }
@keyframes f4-step0 { 0%, 76% { opacity: 0; transform: rotateY(450deg) scaleX(-1); } 76.1% { opacity: 1; transform: rotateY(450deg) scaleX(-1); } 100% { opacity: 1; transform: rotateY(630deg) scaleX(-1); } }
@keyframes loop-standard { 0% { opacity: 1; transform: rotateY(-90deg); } 25% { opacity: 1; transform: rotateY(90deg); } 25.1%, 100% { opacity: 0; } }
@keyframes loop-mirrored { 0% { opacity: 1; transform: rotateY(90deg) scaleX(-1); } 25% { opacity: 1; transform: rotateY(270deg) scaleX(-1); } 25.1%, 100% { opacity: 0; } }

.hdr-wrap { font-family: 'Alte Haas Grotesk', sans-serif; font-size: 0.90rem; color: var(--accent); letter-spacing: .02em; white-space: nowrap; }
.nav { position: sticky; top: 50px; z-index: 199; background: var(--bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-glass); border-bottom: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 11px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s, border-color .2s; }
.nav-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.sec { padding: 16px; display: none; }
.sec.on { display: block; }
.preview-card { background: rgba(67,84,54,.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
.card { background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
.card-lbl { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-name { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .88rem; color: var(--accent); flex: 1; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.row-time { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .88rem; color: var(--accent); }
.row-pts { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 1.25rem; min-width: 28px; text-align: right; }
.badge { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; font-weight: bold; }
.b-alive { background: rgba(106,191,106,.12); color: var(--green); }
.b-out   { background: rgba(217,85,85,.12); color: var(--red); }
.b-win   { background: rgba(240,180,40,.18); color: var(--accent); }
.b-streak { background: linear-gradient(135deg, #f0b428 0%, #ffd04d 100%); color: #000; box-shadow: 0 0 8px rgba(240, 180, 40, 0.4); border: none; padding: 3px 7px 1px; border-radius: 20px; font-weight: bold; font-size: 0.52; letter-spacing: 0.02em; transform: translateY(1px); }
.status-emoji { font-size: 0.9rem; margin-left: 5px; vertical-align: middle; }
.b-missing { background: rgba(184,201,168,.1); color: var(--dim); font-size: .55rem; font-style: italic; }
.inp-wrap { margin-bottom: 12px; }
.inp-lbl { display: block; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
input[type=text], input[type=time], textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'Alte Haas Grotesk', sans-serif; font-size: .9rem; outline: none; transition: border-color .2s; }
textarea { resize: vertical; min-height: 140px; font-size: .85rem; line-height: 1.6; }
input:focus, textarea:focus { border-color: var(--accent); }
input::placeholder, textarea::placeholder { color: var(--dim); }
.flex-row { display: flex; gap: 8px; }
.flex-row input { flex: 1; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .15s, opacity .15s; }
.btn + .btn { margin-top: 8px; }
.btn:disabled { opacity: .4; cursor: default; }
.btn-p { background: var(--accent); color: #000; font-weight: 500; }
.btn-p:hover:not(:disabled) { background: var(--accent2); }
.btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-s:hover { background: var(--bg4); }
.btn-d { background: rgba(217,85,85,.12); color: var(--red); border: 1px solid rgba(217,85,85,.25); }
.btn-sm { width: auto; padding: 8px 14px; font-size: .65rem; }
.big-clock { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 3.8rem; letter-spacing: .04em; color: var(--accent); text-align: center; line-height: 1; }
.big-clock-lbl { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); text-align: center; margin-top: 4px; }
.countdown-txt { font-family: 'Alte Haas Grotesk', sans-serif; font-size: 0.85rem; color: #ff8a8a; text-align: center; margin-top: 8px; letter-spacing: 0.03em; font-weight: bold; padding: 0 10px; }
.countdown-name { text-transform: uppercase; }
.prev-winner-tag { flex: 1; margin-left: 10px; overflow: hidden; white-space: nowrap; display: flex; }
.prev-winner-tag span { display: inline-block; padding-right: 25px; animation: marquee 6s linear infinite; color: var(--accent); font-weight: bold; text-transform: uppercase; font-size: 0.6rem; flex-shrink: 0; }
.prev-winner-tag span:only-child { animation: none; }
@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
.winner-banner { background: linear-gradient(135deg, rgba(240,180,40,.12), rgba(240,180,40,.03)); border: 1px solid rgba(240,180,40,.5); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-bottom: 12px; }
.winner-sub { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.winner-name { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 2.8rem; color: var(--accent); letter-spacing: .04em; line-height: 1; }
.winner-pts { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .7rem; color: var(--dim); margin-top: 4px; }
.lb-rank { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 1.8rem; min-width: 32px; color: var(--dim); }
.lb-rank.first { color: var(--accent); }
.day-footer { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .67rem; color: var(--dim); margin-top: 8px; }
.bnd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; color: var(--accent) }
.bnd-row:last-child { border-bottom: none; }
.bnd-range { color: var(--dim); font-size: .65rem; }
#toast { position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; white-space: nowrap; max-width: 90vw; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9000; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: var(--accent); color: var(--accent); }
#toast.err { border-color: var(--red); color: var(--red); }
.sync-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); transition: background .3s; }
.sync-dot.live { background: var(--green); }
.sync-dot.off { background: var(--red); }
.dim { color: var(--dim); } .mono { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .75rem; }
.empty { text-align: center; padding: 44px 20px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; color: var(--dim); letter-spacing: .1em; }
.center { text-align: center; } .accent { color: var(--accent); } .red { color: var(--red); }
.loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-screen img { max-width: 200px; }
.loading-txt { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }

.hist-row { cursor: pointer; padding: 0 !important; overflow: hidden; }
.hist-summary { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; }
.hist-day-tag { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 0.7rem; color: var(--dim); text-transform: uppercase; margin-right: 10px; }
.hist-main-info { flex: 1; display: flex; align-items: baseline; gap: 6px; }
.hist-meta { display: flex; align-items: center; gap: 10px; font-size: 0.8rem; }
.hist-arrow { font-size: 0.6rem; transition: transform 0.3s ease; color: var(--accent); opacity: 0.7; }
.hist-row.open .hist-arrow { transform: rotate(90deg); }
.hist-details { display: none; padding: 0 16px 16px; border-top: 1px solid rgba(61, 84, 51, 0.2); background: rgba(0,0,0,0.05); }
.hist-row.open .hist-details { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <img src="imgs/tunacan.png" alt="TotoWrap">
    <div class="loading-txt" style="text-align:center;line-height:2.2">
      <span style="color:var(--accent);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase">Wait for the admin to start today's game</span><br>
      <span style="color:var(--accent);font-style:italic;font-size:.7rem;opacity:.8">"At my signal, unleash hell"</span>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
/* --- COMPLETE FINALIZED CODE --- */

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDChGuB5CtWRD0u8j-GFzDOvqsGXdkDNFI",
  authDomain: "totowrapp.firebaseapp.com",
  databaseURL: "https://totowrapp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "totowrapp",
  storageBucket: "totowrapp.firebasestorage.app",
  messagingSenderId: "392119675244",
  appId: "1:392119675244:web:0d2082153198648360eb49"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const STATE_REF = doc(db, "totowrap", "state");

let S = { playerRoster: [], scores: {}, days: [], today: null };
const IS_ADMIN = /[?&]admin/.test(location.search) || location.href.includes('?admin');
let _tab = 'today';
let _clockInterval = null;
let _toastTO = null;
let _writing = false;

// Helpers
function get3DLogoHTML() {
  return `<div class="logo-3d-container"><div class="logo-3d-inner">
    <img src="imgs/tonnowrap.png" class="face face-1"><img src="imgs/tuna.png" class="face face-2">
    <img src="imgs/totowrap.png"  class="face face-3"><img src="imgs/tuna.png" class="face face-4">
  </div></div>`;
}

function formatNames(names) {
  if (!names || names.length === 0) return '';
  if (names.length === 1) return names[0];
  if (names.length === 2) return names[0] + ' and ' + names[1];
  return names.slice(0, -1).join(', ') + ', and ' + names[names.length - 1];
}

function getSortedPlayerRoster() {
  return [...S.playerRoster].sort((a, b) => {
    const scoreA = S.scores[a.name] || 0;
    const scoreB = S.scores[b.name] || 0;
    if (scoreB !== scoreA) return scoreB - scoreA;
    return a.name.localeCompare(b.name);
  });
}

async function saveS() {
  _writing = true;
  try { await setDoc(STATE_REF, S); } catch(e) { console.error("Save error:", e); toast("Sync error", "err"); }
  setTimeout(() => { _writing = false; }, 500);
}

function toSec(t) { if(!t) return 0; const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); }
function secToHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function nowSec() { const d=new Date(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function nowHMS() { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }

function parsePaste(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  const guesses = [];
  let wrapTime = null;
  for (const line of lines) {
    const wrapMatch = line.match(/^wrap\s*[-\s:]\s*(\d{2}:\d{2})$/i);
    if (wrapMatch) { wrapTime = wrapMatch[1]; continue; }
    const match = line.match(/^(.+?)(?:\s*[-\s:]\s*)(\d{2}:\d{2})$/);
    if (match) guesses.push({ name: match[1].trim(), time: match[2] });
  }
  return { guesses, wrapTime };
}

function buildFullGuessList(parsed) {
  const result = [];
  const submitted = new Set(parsed.map(g => g.name));
  parsed.forEach(g => result.push(g));
  S.playerRoster.forEach(p => { if (!submitted.has(p.name)) result.push({ name: p.name, time: null }); });
  return result;
}

function midSec(a,b) { return Math.floor((a+b)/2); }
function sortedGuesses(guesses) {
  const withTime = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const missing = guesses.filter(g => !g.time);
  return [...withTime, ...missing];
}

function boundaries(guesses) {
  const valid = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  if (valid.length === 0) return [];
  const groups = [];
  valid.forEach(g => {
    const sec = toSec(g.time);
    const existing = groups.find(grp => grp.sec === sec);
    if (existing) existing.names.push(g.name); else groups.push({ names: [g.name], sec: sec });
  });
  const slices = [];
  for (let i = 0; i < groups.length; i++) {
    let startSec = 0, endSec = 86399;
    if (i > 0) startSec = midSec(groups[i-1].sec, groups[i].sec);
    if (i < groups.length - 1) endSec = midSec(groups[i].sec, groups[i+1].sec) - 1;
    slices.push({ names: groups[i].names, start: startSec, end: endSec, startStr: secToHMS(startSec), endStr: secToHMS(endSec) });
  }
  return slices;
}

function eliminated(guesses, curSec) {
  const slices = boundaries(guesses), out = new Set();
  slices.forEach(slice => { if (curSec > slice.end) slice.names.forEach(name => out.add(name)); });
  return out;
}

function calcWinner(guesses, wrapHMSInput) {
  const wrapSec = toSec(wrapHMSInput), slices = boundaries(guesses);
  const winningSlice = slices.find(s => wrapSec >= s.start && wrapSec <= s.end);
  if (!winningSlice) return { winner: "Error", winners: [], points: 0 };
  const winnerName = winningSlice.names[0], winners = winningSlice.names.map(name => ({ name }));
  const firstWinnerGuess = guesses.find(g => g.name === winnerName).time;
  const points = (wrapHMSInput.slice(0,5) === firstWinnerGuess) ? 3 : 1;
  return { winner: winnerName, winners, points };
}
    
function getPreviousStreak(playerName) {
  if (!S.days || S.days.length === 0) return { count: 0, pill: "" };
  let count = 0;
  for (let i = S.days.length - 1; i >= 0; i--) {
    const dayWinners = S.days[i].winners ? S.days[i].winners.map(w => w.name) : [S.days[i].winner];
    if (dayWinners.includes(playerName)) count++; else break;
  }
  if (count >= 2) return { count: count, pill: `<div class="badge b-streak">${count} Days Streak</div>` };
  return { count: 0, pill: "" };
}

function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  const t = nowHMS(), cur = nowSec();
  document.querySelectorAll('.js-clock').forEach(el => el.textContent = t);
  const countdownEl = document.getElementById('next-out-countdown');
  if (countdownEl && S.today && S.today.guesses && S.today.guesses.length > 0 && !S.today.wrapTime) {
    const slices = boundaries(S.today.guesses), nextBoundary = slices.find(s => s.end >= cur);
    if (nextBoundary && cur <= nextBoundary.end) {
      const diff = (nextBoundary.end + 1) - cur;
      countdownEl.innerHTML = `Next elimination <span class="countdown-name">${formatNames(nextBoundary.names)}</span> in: ${secToHMS(diff)}`;
      countdownEl.style.display = 'block';
    } else {
      const currentLeader = formatNames(slices[slices.length - 1].names);
      countdownEl.innerHTML = `Good job <span class="countdown-name">${currentLeader}</span>!<br><span style="font-size: 0.75rem; opacity: 0.9;">Today was your lucky day!</span>`;
      countdownEl.style.display = 'block';
    }
  } else if (countdownEl) countdownEl.style.display = 'none';
  refreshStatusBadges();
}

function refreshStatusBadges() {
  if(!S.today||!S.today.guesses.length||S.today.wrapTime) return;
  const cur=nowSec(), out=eliminated(S.today.guesses,cur);
  S.today.guesses.forEach(g=>{
    const safeId = g.name.replace(/\s+/g, '-');
    const el=document.getElementById('st-'+safeId); 
    const emojiEl=document.getElementById('emoji-'+safeId);
    if(!el) return;
    if(out.has(g.name)){
      el.className='badge b-out'; el.textContent='OUT';
      if(emojiEl) emojiEl.textContent = '🍣';
    } else {
      el.className='badge b-alive'; el.textContent='ALIVE';
      if(emojiEl) emojiEl.textContent = '🐟';
    }
  });
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(_toastTO); _toastTO=setTimeout(()=>el.className='', 3000);
}

function render() {
  const app=document.getElementById('app');
  if(IS_ADMIN) { 
    app.innerHTML=renderAdminMain(); 
    startClock(); 
    bindNav(); 
    bindAdminActions(); 
  } else { 
    app.innerHTML=renderPlayerMain(); 
    startClock(); 
    bindNav(); 
  }
}

function renderPlayerMain() {
  const dayNum = S.days.length + (S.today ? 1 : 0);
  const dotClass = (S.today && S.today.wrapTime) ? 'off' : 'live';
  const estWrap = S.today?.estWrap || '--:--';
  return `
<div class="hdr">
  <div class="hdr-day">Day ${dayNum || '—'}/50</div>
  ${get3DLogoHTML()}
  <div class="hdr-right">
    <div class="hdr-wrap">Wrap ${estWrap}</div>
    <span class="sync-dot js-sync-dot ${dotClass}"></span>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderTodaySection()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderHistory()}</div>`;
}

function renderAdminMain() {
  const totalDays = S.days.length + (S.today ? 1 : 0);
  const estWrap = S.today?.estWrap || '--:--';
  return `
<div class="hdr">
  <div class="hdr-day">Day ${totalDays||'—'}/50</div>
  ${get3DLogoHTML()}
  <div class="hdr-right">
    <div class="hdr-wrap">Wrap ${estWrap}</div>
    <span class="sync-dot js-sync-dot ${S.today&&S.today.wrapTime?'off':'live'}"></span>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
  <button class="nav-btn ${_tab==='settings'?'on':''}" data-tab="settings">⚙</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderTodaySection()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderHistory()}</div>
<div class="sec ${_tab==='settings'?'on':''}">${renderSettings()}</div>`;
}

function renderTodaySection() {
  const t = S.today, lastDay = S.days && S.days.length > 0 ? S.days[S.days.length - 1] : null;
  
  // MARQUEE LOGIC
  let winnerHtml = '';
  if (lastDay) {
    const prevWinnersList = lastDay.winners ? lastDay.winners.map(w => w.name) : [lastDay.winner];
    const prevWinnerStr = formatNames(prevWinnersList);
    const label = prevWinnersList.length > 1 ? "YESTERDAY'S WINNERS" : "YESTERDAY'S WINNER";
    winnerHtml = `<div class="prev-winner-tag"><span>${label}: ${prevWinnerStr} 🥇 </span><span>${label}: ${prevWinnerStr} 🥇 </span></div>`;
  }
  const statusHeader = `<div style="display:flex; justify-content:space-between; align-items:center; width:100%;"><span>Player Status</span>${winnerHtml}</div>`;

  if (!t) {
      if (IS_ADMIN) return `<div class="card"><div class="card-lbl">Start New Day</div><button class="btn btn-p" id="new-day-btn">🎬 Start Today's Game</button></div>`;
      return `<div class="card"><div class="card-lbl">${statusHeader}</div><div class="empty" style="padding:20px 0;">No active game today</div></div>${lastDay ? `<p class="mono dim center">Last wrap: <span class="accent">${lastDay.wrapTime}</span></p>` : ''}`;
  }

  // WRAPPED RESULTS
  if (t.wrapTime) {
    const sg = sortedGuesses(t.guesses), todayWinnersList = t.winners ? t.winners.map(w => w.name) : [t.winner];
    const streakInfo = getPreviousStreak(todayWinnersList[0]);
    const streakHtml = (todayWinnersList.length === 1 && streakInfo.count >= 2) ? `<div style="font-size:0.65rem; color:var(--accent); margin-top:4px; letter-spacing:0.1em; text-transform:uppercase;">${streakInfo.count} Days Streak</div>` : '';
    
    let html = `<div class="winner-banner"><div class="winner-sub">🎬 Today's Winner${todayWinnersList.length > 1 ? 's' : ''}</div><div class="winner-name" style="font-size: 2.2rem;">${formatNames(todayWinnersList)}</div>${streakHtml}<div class="winner-pts">+${t.points} pt · Wrap at ${t.wrapTime}</div></div>
    <div class="card"><div class="card-lbl">Results</div>${sg.map(g => {
      const isWinner = todayWinnersList.includes(g.name);
      return `<div class="row"><div class="row-name">${g.name} <span>${isWinner ? '🏆' : '🍣'}</span> ${getPreviousStreak(g.name).pill}</div>${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}${isWinner ? `<div class="badge b-win">+${t.points}pt</div>` : ''}</div>`;
    }).join('')}</div>`;
    
    if (IS_ADMIN) html += `<button class="btn btn-p" id="new-day-btn">Start Next Day →</button>`;
    return html;
  }

  // ACTIVE GAME (Guesses exist)
  if (t.guesses && t.guesses.length > 0) {
      const cur = nowSec(), out = eliminated(t.guesses, cur), sg = sortedGuesses(t.guesses), slices = boundaries(t.guesses);
      let html = `<div class="card"><div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-left: 20px;"><div class="big-clock js-clock">--:--:--</div><span class="sync-dot js-sync-dot live" style="width: 12px; height: 12px;"></span></div><div class="big-clock-lbl">Live Time</div><div id="next-out-countdown" class="countdown-txt"></div></div>
      <div class="card"><div class="card-lbl">${statusHeader}</div>${sg.map(g => {
        const isEliminated = out.has(g.name), safeId = g.name.replace(/\s+/g, '-');
        return `<div class="row"><div class="row-name">${g.name} <span id="emoji-${safeId}">${isEliminated ? '🍣' : '🐟'}</span> ${getPreviousStreak(g.name).pill}</div>${g.time ? `<div class="row-time">${g.time}</div><div class="badge ${isEliminated ? 'b-out' : 'b-alive'}" id="st-${safeId}">${isEliminated ? 'OUT' : 'ALIVE'}</div>` : `<div class="badge b-missing">Oggi questo tonno non ha scommesso</div>`}</div>`;
      }).join('')}</div>
      <div class="card"><div class="card-lbl">Territory Boundaries</div>${slices.map(s => `<div class="bnd-row"><span>${formatNames(s.names)}</span><span class="bnd-range">${s.startStr} → ${s.endStr}</span></div>`).join('')}</div>`;
      
      if (IS_ADMIN) html += `<div class="card"><div class="card-lbl">Wrap Time</div><input type="text" id="wrap-inp" placeholder="18:30:45"><div class="flex-row" style="margin-top:10px"><button class="btn btn-s" id="set-now-btn">Current</button><button class="btn btn-p" id="wrap-btn">Confirm</button></div></div>`;
      return html;
  }

  // EMPTY GAME (Admin needs to paste)
  if (IS_ADMIN) return `<div class="card"><div class="card-lbl">Paste Guesses</div><textarea id="paste-inp" placeholder="Name - HH:MM\nWrap - HH:MM"></textarea><button class="btn btn-p" id="parse-btn" style="margin-top:10px">Preview</button></div>`;
  return `<div class="card"><div class="card-lbl">Status</div><div class="empty">Waiting for guesses...</div></div>`;
}

function renderBoard() {
  const pl = getSortedPlayerRoster();
  return `<div class="card"><div class="card-lbl">Standings</div>${pl.map((p,i)=>`<div class="row"><div class="lb-rank ${i===0?'first':''}">${i+1}</div><div class="row-name">${p.name} <span>${i===0?'👑':''}</span> ${getPreviousStreak(p.name).pill}</div><div class="row-pts accent">${S.scores[p.name]||0} pts</div></div>`).join('')}</div>`;
}

function renderHistory() {
  let all = [...S.days]; if (S.today && S.today.wrapTime) all.push(S.today);
  if (!all.length) return '<div class="empty">No history</div>';
  return [...all].reverse().map((d, i) => {
    const names = d.winners ? d.winners.map(w => w.name) : [d.winner];
    return `<div class="card hist-row" onclick="this.classList.toggle('open')"><div class="hist-summary"><div class="hist-main-info"><span class="hist-day-tag">Day ${all.length-i}</span><span class="accent">${formatNames(names)}</span></div><div class="hist-meta"><span class="accent mono">${d.wrapTime}</span><span class="hist-arrow">▶</span></div></div><div class="hist-details" onclick="event.stopPropagation()">${sortedGuesses(d.guesses).map(g => {
        const isWinner = names.includes(g.name);
        return `<div class="row"><div class="row-name">${g.name} <span>${isWinner ? '🏆' : '🍣'}</span> ${getPreviousStreak(g.name).pill}</div><div class="row-time">${g.time || '--:--'}</div><div class="badge ${isWinner?'b-win':'b-out'}">${isWinner?`+${d.points}pt`:''}</div></div>`;
    }).join('')}</div></div>`;
  }).join('');
}

function renderSettings() {
  const pl = getSortedPlayerRoster();
  return `<div class="card"><div class="card-lbl">Roster</div>${pl.map((p, idx)=> {
    const rIdx = S.playerRoster.findIndex(o => o.name === p.name);
    return `<div class="row"><input type="text" value="${p.name}" id="name-${rIdx}" style="flex:1"><input type="number" value="${S.scores[p.name]||0}" id="pts-${rIdx}" style="width:60px;margin:0 5px"><button class="btn btn-s btn-sm" onclick="savePlayer(${rIdx})">Save</button><button class="btn btn-d btn-sm" onclick="deletePlayer(${rIdx})">×</button></div>`}).join('')}</div><div class="card"><button class="btn btn-d" id="reset-btn">Reset All</button></div>`;
}

function bindNav() { 
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { 
      _tab = btn.dataset.tab; 
      render(); 
    }); 
  }); 
}

function bindAdminActions() {
  document.getElementById('new-day-btn')?.addEventListener('click', () => { if(S.today?.wrapTime) S.days.push({...S.today}); S.today={date:new Date().toLocaleDateString(),guesses:[],wrapTime:null}; saveS(); render(); });
  document.getElementById('wrap-btn')?.addEventListener('click', () => { const v = document.getElementById('wrap-inp').value; if(!v) return; const {winners,points}=calcWinner(S.today.guesses,v); S.today.wrapTime=v; S.today.winners=winners; S.today.points=points; winners.forEach(w=>S.scores[w.name]=(S.scores[w.name]||0)+points); saveS(); render(); });
  document.getElementById('set-now-btn')?.addEventListener('click', () => { const i = document.getElementById('wrap-inp'); if(i) i.value=nowHMS(); });
  document.getElementById('parse-btn')?.addEventListener('click', showPreview);
  document.getElementById('reset-btn')?.addEventListener('click', () => { if(confirm('Reset?')) { S={playerRoster:[],scores:{},days:[],today:null}; saveS(); render(); } });
}

function showPreview() {
  const text = document.getElementById('paste-inp')?.value || '';
  const { guesses, wrapTime } = parsePaste(text);
  if (!guesses.length && !wrapTime) return toast('No data', 'err');
  const existingNames = new Set(S.playerRoster.map(p => p.name.toLowerCase())), newPlayers = [];
  guesses.forEach(g => { if (!existingNames.has(g.name.toLowerCase())) newPlayers.push(g.name); });
  const full = buildFullGuessList(guesses);
  document.getElementById('app').innerHTML = `<div class="hdr"><div class="hdr-day">Preview</div>${get3DLogoHTML()}</div><div style="padding:16px"><div class="card"><div class="card-lbl">Wrap Time: ${wrapTime || 'Missing'}</div></div><div class="card"><div class="preview-card">${sortedGuesses(full).map(g => `<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time||'--:--'}</div></div>`).join('')}</div></div><button class="btn btn-p" id="confirm-btn">Confirm</button><button class="btn btn-s" id="cancel-btn">Back</button></div>`;
  document.getElementById('confirm-btn').onclick = () => {
    newPlayers.forEach(n => { S.playerRoster.push({name:n}); S.scores[n]=0; });
    S.today.guesses = full; S.today.estWrap = wrapTime; saveS(); render();
  };
  document.getElementById('cancel-btn').onclick = () => render();
}

window.savePlayer = (idx) => {
  const n = document.getElementById(`name-${idx}`).value.trim(), p = parseInt(document.getElementById(`pts-${idx}`).value) || 0;
  if (!n) return;
  const old = S.playerRoster[idx].name;
  if (old !== n) { S.playerRoster[idx].name = n; S.scores[n] = S.scores[old]; delete S.scores[old]; }
  S.scores[n] = p; saveS(); render();
};

window.deletePlayer = (idx) => { if(confirm('Delete?')) { S.playerRoster.splice(idx,1); saveS(); render(); } };

onSnapshot(STATE_REF, (snap) => {
  if(_writing) return;
  if(snap.exists()) S = snap.data();
  render();
});
</script>
</body>
</html>
