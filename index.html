<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TotoWrap</title>
<style>
/* Custom Font Declaration */
@font-face {
  font-family: 'Alte Haas Grotesk';
  src: url('fonts/AlteHaasGroteskBold.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --bg:      #263759;
  --bg2:     #3a4b6d;
  --bg3:     #31405d;
  --bg4:     #2c3954;
  --border:  #3d5433;
  --text:    #eec763;
  --dim:     #b8c9a8;
  --accent:  #f0b428;
  --accent2: #ffd04d;
  --red:     #d96060;
  --green:   #8fdf6a;
  --radius:  10px;
  --bg-glass: rgba(58, 75, 109, 0.45);      /* Semi-transparent blue */
  --border-glass: rgba(238, 199, 99, 0.15); /* Subtle gold tint */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; }

body {
  background-color: var(--bg);
  /* background-image: url('imgs/bgblu.png'); */
  background-size: repeat;
  background-attachment: fixed;
  background-position: center;
  color: var(--text);
  font-family: 'Alte Haas Grotesk', sans-serif;
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior: none;
}

/* Centered Blurred Image Overlay */
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 320px;
  background-image: url('imgs/tunacan.png');
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  /* filter: blur(3px); */
  z-index: -1;
  pointer-events: none;
}

#app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding-bottom: 40px;
  min-height: 100vh;
}

.hdr { position: sticky; top: 0; z-index: 200; background: var(--bg);  backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--border-glass); border-bottom: 1px solid var(--border); padding: 10px 18px 8px; display: flex; justify-content: space-between; align-items: center; height: 50px}
.hdr-right { font-family: 'Alte Haas Grotesk'; text-align: right; display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; }
.hdr-day { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 1.3rem; color: var(--accent); letter-spacing: .02em; flex: 1; }

.hdr-logo {
  height: 30px;
  width: auto;
  object-fit: contain;
  margin: 0 10px;
  flex-shrink: 0;
}

.hdr-clock { font-family: 'Alte Haas Grotesk', sans-serif; font-size: 1.3rem; color: var(--accent); letter-spacing: .05em; }
.nav { position: sticky; top: 50px; z-index: 199; background: var(--bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-glass); border-bottom: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 11px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s, border-color .2s; }
.nav-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.sec { padding: 16px; display: none; }
.sec.on { display: block; }
.preview-card { background: rgba(67,84,54,.6); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; max-height: 300px; overflow-y: auto; }
.card { background: var(--bg-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border-glass); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); }
.card-lbl { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-name { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .88rem; color: var(--accent); flex: 1; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.row-time { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .88rem; color: var(--accent); }
.badge { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; font-weight: bold; }
.b-alive { background: rgba(106,191,106,.12); color: var(--green); }
.b-out   { background: rgba(217,85,85,.12); color: var(--red); }
.b-win   { background: rgba(240,180,40,.18); color: var(--accent); }
.b-missing { background: rgba(184,201,168,.1); color: var(--dim); font-size: .55rem; font-style: italic; }
.inp-wrap { margin-bottom: 12px; }
.inp-lbl { display: block; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
input[type=text], input[type=number], textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'Alte Haas Grotesk', sans-serif; font-size: .9rem; outline: none; }
textarea { resize: vertical; min-height: 140px; font-size: .85rem; line-height: 1.6; }
.flex-row { display: flex; gap: 8px; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; }
.btn-p { background: var(--accent); color: #000; font-weight: 500; }
.btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-d { background: rgba(217,85,85,.12); color: var(--red); border: 1px solid rgba(217,85,85,.25); }
.btn-sm { width: auto; padding: 8px 14px; font-size: .65rem; }
.big-clock { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 3.8rem; letter-spacing: .04em; color: var(--accent); text-align: center; line-height: 1; }
.big-clock-lbl { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); text-align: center; margin-top: 4px; }
.countdown-txt { font-family: 'Alte Haas Grotesk', sans-serif; font-size: 0.9rem; color: #ff8a8a; text-align: center; margin-top: 8px; letter-spacing: 0.05em; font-weight: bold; }
.countdown-name { text-transform: uppercase; }
.winner-banner { background: linear-gradient(135deg, rgba(240,180,40,.12), rgba(240,180,40,.03)); border: 1px solid rgba(240,180,40,.5); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-bottom: 12px; }
.winner-sub { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.winner-name { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 2.8rem; color: var(--accent); letter-spacing: .04em; line-height: 1; }
.winner-pts { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .7rem; color: var(--dim); margin-top: 4px; }
.lb-rank { font-family: 'Alte Haas Grotesk', sans-serif; font-weight: bold; font-size: 1.8rem; min-width: 32px; color: var(--dim); }
.lb-rank.first { color: var(--accent); }
.bnd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; color: var(--accent) }
.bnd-row:last-child { border-bottom: none; }
.bnd-range { color: var(--dim); font-size: .65rem; }
#toast { position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; white-space: nowrap; max-width: 90vw; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9000; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.sync-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); transition: background .3s; }
.sync-dot.live { background: var(--green); }
.sync-dot.off { background: var(--red); }
.dim { color: var(--dim); } .mono { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .75rem; }
.empty { text-align: center; padding: 44px 20px; font-family: 'Alte Haas Grotesk', sans-serif; font-size: .72rem; color: var(--dim); letter-spacing: .1em; }
.center { text-align: center; } .accent { color: var(--accent); } .red { color: var(--red); }
.loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-screen img { max-width: 200px; }
.loading-txt { font-family: 'Alte Haas Grotesk', sans-serif; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <img src="imgs/tunacan.png" alt="TotoWrap">
    <div class="loading-txt" style="text-align:center;line-height:2.2">
      <span style="color:var(--accent);font-size:.75rem;letter-spacing:.1em;text-transform:uppercase">Wait for the admin to start today's game</span><br>
      <span style="color:var(--accent);font-style:italic;font-size:.7rem;opacity:.8">"At my signal, unleash hell"</span>
    </div>
  </div>
</div>
<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDChGuB5CtWRD0u8j-GFzDOvqsGXdkDNFI",
  authDomain: "totowrapp.firebaseapp.com",
  databaseURL: "https://totowrapp-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "totowrapp",
  storageBucket: "totowrapp.firebasestorage.app",
  messagingSenderId: "392119675244",
  appId: "1:392119675244:web:0d2082153198648360eb49"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const STATE_REF = doc(db, "totowrap", "state");

let S = { playerRoster: [], scores: {}, days: [], today: null };
const IS_ADMIN = /[?&]admin/.test(location.search) || location.href.includes('?admin');
let _tab = 'today';
let _clockInterval = null;
let _toastTO = null;
let _writing = false;

function getSortedPlayerRoster() {
  return [...S.playerRoster].sort((a, b) => (S.scores[b.name] || 0) - (S.scores[a.name] || 0) || a.name.localeCompare(b.name));
}

async function saveS() {
  _writing = true;
  try { await setDoc(STATE_REF, S); } catch(e) { toast("Sync error", "err"); }
  setTimeout(() => { _writing = false; }, 500);
}

function toSec(t) { const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); }
function secToHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function nowSec() { const d=new Date(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function nowHMS() { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }

function parsePaste(text) {
  const lines = text.trim().split('\n');
  const guesses = [];
  for (const line of lines) {
    const match = line.match(/^(.+?)\s*-\s*(\d{2}:\d{2})$/);
    if (match) guesses.push({ name: match[1].trim(), time: match[2] });
  }
  return guesses;
}

function buildFullGuessList(parsed) {
  const result = [...parsed];
  const submitted = new Set(parsed.map(g => g.name));
  S.playerRoster.forEach(p => { if (!submitted.has(p.name)) result.push({ name: p.name, time: null }); });
  return result;
}

function boundaries(guesses) {
  const valid = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  return valid.slice(0,-1).map((g,i) => {
    const mid = Math.floor((toSec(valid[i].time) + toSec(valid[i+1].time))/2);
    return { nameA: valid[i].name, nameB: valid[i+1].name, sec: mid, str: secToHMS(mid) };
  });
}

function eliminated(guesses, curSec) {
  const valid = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  const out = new Set();
  b.forEach((bd,i) => { if (curSec > bd.sec) out.add(valid[i].name); });
  return out;
}

function calcWinner(guesses, wrapHHMM) {
  const wrapSec = toSec(wrapHHMM);
  const s = guesses.filter(g => g.time).sort((a,b) => toSec(a.time) - toSec(b.time));
  const b = boundaries(guesses);
  let wi = 0;
  b.forEach((bd,i) => { if (wrapSec >= bd.sec) wi = i + 1; });
  const winner = s[wi];
  const points = (wrapHHMM.slice(0,5) === winner.time) ? 3 : 1;
  return { winner: winner.name, winners: s.filter(g => g.time === winner.time), points };
}

function getPreviousStreak(playerName) {
  if (!S.days.length) return { count: 0, pill: "" };
  let count = 0;
  for (let i = S.days.length - 1; i >= 0; i--) {
    if (S.days[i].winner === playerName) count++; else break;
  }
  return count >= 2 ? { count, pill: `<div class="badge b-alive">${count} Days Streak</div>` } : { count: 0, pill: "" };
}

function getLastWinnerHeader() {
  const last = S.days.length ? S.days[S.days.length - 1] : null;
  if (!last) return "";
  return `<span style="margin: 0 8px; opacity: 0.3">|</span> <span style="color:var(--accent); text-transform: none; letter-spacing: normal;">Yesterday's Winner: ${last.winner} 🥇</span>`;
}

function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(tickClock, 1000);
  tickClock();
}

function tickClock() {
  const t = nowHMS();
  const cur = nowSec();
  document.querySelectorAll('.js-clock').forEach(el => el.textContent = t);
  const countdownEl = document.getElementById('next-out-countdown');
  if (countdownEl && S.today?.guesses?.length && !S.today.wrapTime) {
    const bnds = boundaries(S.today.guesses);
    const nextBnd = bnds.find(b => b.sec > cur);
    if (nextBnd) {
      countdownEl.innerHTML = `Next elimination <span class="countdown-name">${nextBnd.nameA}</span> in: ${secToHMS(nextBnd.sec - cur)}`;
      countdownEl.style.display = 'block';
    } else {
      countdownEl.textContent = "Final territory reached";
    }
  } else if (countdownEl) countdownEl.style.display = 'none';
  refreshStatusBadges();
}

function refreshStatusBadges() {
  if(!S.today?.guesses.length || S.today.wrapTime) return;
  const out = eliminated(S.today.guesses, nowSec());
  S.today.guesses.forEach(g => {
    const el = document.getElementById('st-'+g.name); if(!el) return;
    if(out.has(g.name)) { el.className='badge b-out'; el.textContent='OUT'; }
    else { el.className='badge b-alive'; el.textContent='ALIVE'; }
  });
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(_toastTO);
  _toastTO=setTimeout(()=>el.className='',3000);
}

function render() {
  const app=document.getElementById('app');
  if(IS_ADMIN) { app.innerHTML=renderMain(); startClock(); bindMain(); }
  else { app.innerHTML=renderPlayerMain(); startClock(); bindPlayerNav(); }
}

function renderPlayerMain() {
  const dayNum = S.days.length + (S.today ? 1 : 0);
  const dotClass = (S.today && S.today.wrapTime) ? 'off' : 'live';
  return `
<div class="hdr">
  <div class="hdr-day">Day ${dayNum || '—'}/50</div>
  <img src="imgs/tonnowrap.png" class="hdr-logo" alt="Logo">
  <div class="hdr-right"><div class="hdr-clock js-clock">--:--:--</div><span class="sync-dot ${dotClass}" id="sync-dot"></span></div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderPlayerToday()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderHistory()}</div>`;
}

function renderPlayerToday() {
  const t = S.today;
  const lastWinnerHtml = getLastWinnerHeader();
  if (!t) return `<div class="empty">No active game today</div>`;
  if (t.wrapTime) {
    const sg = sortedGuesses(t.guesses);
    const streakInfo = getPreviousStreak(t.winner);
    const streakHtml = streakInfo.count >= 2 ? `<div style="font-size:0.65rem; color:var(--accent); margin-top:4px; letter-spacing:0.1em; text-transform:uppercase;">${streakInfo.count} Days Streak</div>` : '';
    return `
      <div class="winner-banner">
        <div class="winner-sub">🎬 Today's Winner</div>
        <div class="winner-name">${t.winner}</div>
        ${streakHtml}
        <div class="winner-pts">+${t.points} pt · Wrap at ${t.wrapTime}</div>
      </div>
      <div class="card"><div class="card-lbl">Results ${lastWinnerHtml}</div>
        ${sg.map(g => `<div class="row"><div class="row-name">${g.name} ${getPreviousStreak(g.name).pill}</div>${g.time ? `<div class="row-time">${g.time}</div>` : `<div class="badge b-missing">Missing bet</div>`}${g.name === t.winner ? `<div class="badge b-win">+${t.points}pt</div>` : ''}</div>`).join('')}
      </div>`;
  }
  const sg = sortedGuesses(t.guesses || []);
  if (!sg.some(g => g.time)) return `<div class="card"><div class="card-lbl">Collecting Guesses ${lastWinnerHtml}</div><p class="mono dim center">Waiting for guesses...</p></div>`;
  const out = eliminated(t.guesses, nowSec());
  const bnds = boundaries(t.guesses);
  return `
    <div class="card"><div class="big-clock js-clock">--:--:--</div><div class="big-clock-lbl">Live Time</div><div id="next-out-countdown" class="countdown-txt"></div></div>
    <div class="card"><div class="card-lbl">Player Status ${lastWinnerHtml}</div>
      ${sg.map(g => `<div class="row"><div class="row-name">${g.name} ${getPreviousStreak(g.name).pill}</div>${g.time ? `<div class="row-time">${g.time}</div><div class="badge ${out.has(g.name) ? 'b-out' : 'b-alive'}" id="st-${g.name}">${out.has(g.name) ? 'OUT' : 'ALIVE'}</div>` : `<div class="badge b-missing">Missing bet</div>`}</div>`).join('')}
    </div>
    <div class="card"><div class="card-lbl">Territory Boundaries</div>
      ${sg.filter(g => g.time).map((g,i) => `<div class="bnd-row"><span>${g.name}</span><span class="bnd-range">${i===0 ? '00:00:00' : bnds[i-1].str} → ${i===sg.filter(g=>g.time).length-1 ? '23:59:59' : bnds[i].str}</span></div>`).join('')}
    </div>`;
}

function bindPlayerNav() { document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', () => { _tab = btn.dataset.tab; render(); })); }

function renderMain() {
  const totalDays=S.days.length+(S.today?1:0);
  return `
<div class="hdr">
  <div class="hdr-day">Day ${totalDays||'—'}/50</div>
  <img src="imgs/tonnowrap.png" class="hdr-logo" alt="Logo">
  <div class="hdr-right"><div class="hdr-clock js-clock">--:--:--</div><span class="sync-dot ${S.today&&S.today.wrapTime?'off':'live'}" id="sync-dot"></span></div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
  <button class="nav-btn ${_tab==='settings'?'on':''}" data-tab="settings">⚙</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}">${renderToday()}</div>
<div class="sec ${_tab==='board'?'on':''}">${renderBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}">${renderHistory()}</div>
<div class="sec ${_tab==='settings'?'on':''}">${renderSettings()}</div>`;
}

function renderToday() {
  const t = S.today;
  const lastWinnerHtml = getLastWinnerHeader();
  if (!t) return `<div class="card"><div class="card-lbl">Start New Day</div><button class="btn btn-p" id="new-day-btn">🎬 Start Today's Game</button></div>`;
  if (t.wrapTime) {
    return `
      <div class="winner-banner"><div class="winner-sub">🎬 Today's Winner</div><div class="winner-name">${t.winner}</div><div class="winner-pts">+${t.points} pt</div></div>
      <div class="card"><div class="card-lbl">Results ${lastWinnerHtml}</div>
        ${sortedGuesses(t.guesses).map(g => `<div class="row"><div class="row-name">${g.name}</div>${g.name === t.winner ? `<div class="badge b-win">+${t.points}pt</div>` : ''}</div>`).join('')}
      </div>
      <button class="btn btn-p" id="new-day-btn">Start Next Day →</button>`;
  }
  if (t.guesses?.length > 0) {
    const sg = sortedGuesses(t.guesses);
    const out = eliminated(t.guesses, nowSec());
    return `
      <div class="card"><div class="big-clock js-clock">--:--:--</div><div id="next-out-countdown" class="countdown-txt"></div></div>
      <div class="card"><div class="card-lbl">Player Status ${lastWinnerHtml}</div>
        ${sg.map(g => `<div class="row"><div class="row-name">${g.name} ${getPreviousStreak(g.name).pill}</div><div class="badge ${out.has(g.name) ? 'b-out' : 'b-alive'}" id="st-${g.name}">${out.has(g.name) ? 'OUT' : 'ALIVE'}</div></div>`).join('')}
      </div>
      <div class="card"><div class="card-lbl">Enter Wrap Time</div><input type="text" id="wrap-inp" placeholder="18:30:45"><div class="flex-row" style="margin-top:10px"><button class="btn btn-s" id="set-now-btn" style="flex:1">⏰ Now</button><button class="btn btn-p" id="wrap-btn" style="flex:1">Confirm ✓</button></div></div>`;
  }
  return `<div class="card"><div class="card-lbl">Paste Guesses ${lastWinnerHtml}</div><textarea id="paste-inp" placeholder="Name - HH:MM"></textarea><button class="btn btn-p" id="parse-btn" style="margin-top:10px">Preview →</button></div>`;
}

function renderBoard() {
  const pl = getSortedPlayerRoster();
  return `<div class="card"><div class="card-lbl">Standings</div>${pl.map((p,i)=>`<div class="row"><div class="lb-rank ${i===0?'first':''}">${i+1}</div><div class="row-name">${p.name} ${getPreviousStreak(p.name).pill}</div><div class="accent">${S.scores[p.name]||0} pts</div></div>`).join('')}</div>`;
}

function renderHistory() {
  let all = [...S.days]; if (S.today?.wrapTime) all.push(S.today);
  return [...all].reverse().map((d, i) => `<div class="card"><div class="row"><div class="row-name">${d.winner}</div><div class="accent">${d.wrapTime}</div><div class="dim">+${d.points}pt</div></div></div>`).join('');
}

function renderSettings() {
  return `<div class="card"><div class="card-lbl">Player Roster</div>${S.playerRoster.map((p, idx)=> `<div class="row"><input type="text" value="${p.name}" id="name-${idx}"><input type="number" value="${S.scores[p.name]||0}" id="pts-${idx}" style="width:80px"><button class="btn btn-s btn-sm" onclick="savePlayer(${idx})">Save</button></div>`).join('')}</div><button class="btn btn-d" id="reset-btn">Reset All</button>`;
}

window.savePlayer = (idx) => {
  const newName = document.getElementById(`name-${idx}`).value.trim();
  const newPts = parseInt(document.getElementById(`pts-${idx}`).value) || 0;
  const oldName = S.playerRoster[idx].name;
  if(oldName !== newName) { S.scores[newName] = S.scores[oldName]; delete S.scores[oldName]; S.playerRoster[idx].name = newName; }
  S.scores[newName] = newPts; saveS(); render();
};

function bindMain() {
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{_tab=btn.dataset.tab;render();}));
  document.getElementById('new-day-btn')?.addEventListener('click', () => { if(S.today?.wrapTime) S.days.push({...S.today}); S.today={date:new Date().toLocaleDateString('en-GB'),guesses:[],wrapTime:null,winner:null,points:null}; saveS(); render(); });
  document.getElementById('wrap-btn')?.addEventListener('click', () => {
    const val = document.getElementById('wrap-inp').value; if(!val) return;
    const { winner, winners, points } = calcWinner(S.today.guesses, val);
    S.today.wrapTime = val; S.today.winner = winner; S.today.points = points;
    winners.forEach(w => S.scores[w.name] = (S.scores[w.name] || 0) + points);
    saveS(); render();
  });
  document.getElementById('set-now-btn')?.addEventListener('click', () => { document.getElementById('wrap-inp').value = nowHMS(); });
  document.getElementById('parse-btn')?.addEventListener('click', () => {
    const parsed = parsePaste(document.getElementById('paste-inp').value);
    if(parsed.length) {
      parsed.forEach(g => { if(!S.playerRoster.find(p=>p.name===g.name)) S.playerRoster.push({name:g.name}); });
      S.today.guesses = buildFullGuessList(parsed); saveS(); render();
    }
  });
  document.getElementById('reset-btn')?.addEventListener('click', () => { if(confirm('Reset?')) { S={playerRoster:[],scores:{},days:[],today:null}; saveS(); render(); } });
}

onSnapshot(STATE_REF, (snap) => { if(!_writing && snap.exists()) { S = snap.data(); render(); } });
</script>
</body>
</html>
