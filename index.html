/* grain removed — bg image has texture */
#app { max-width: 480px; margin: 0 auto; padding-bottom: 90px; min-height: 100vh; }
.hdr { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 18px 8px; display: flex; justify-content: space-between; align-items: center; }
.hdr-logo { height: 44px; object-fit: contain; }
.hdr-right { text-align: right; }
.hdr-day { font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--dim); letter-spacing: .12em; text-transform: uppercase; }
.hdr-clock { font-family: 'DM Mono', monospace; font-size: .9rem; color: var(--accent); letter-spacing: .05em; }
.nav { position: sticky; top: 66px; z-index: 199; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; }
.nav-btn { flex: 1; padding: 11px 4px; background: none; border: none; border-bottom: 2px solid transparent; font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .1em; text-transform: uppercase; color: var(--dim); cursor: pointer; transition: color .2s, border-color .2s; }
.nav-btn.on { color: var(--accent); border-bottom-color: var(--accent); }
.sec { padding: 16px; display: none; }
.sec.on { display: block; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.card-lbl { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
.row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.row:last-child { border-bottom: none; }
.row-name { flex: 1; font-weight: 500; }
.row-time { font-family: 'DM Mono', monospace; font-size: .88rem; color: var(--accent); }
.row-pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.25rem; min-width: 28px; text-align: right; }
.badge { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
.b-alive { background: rgba(106,191,106,.12); color: var(--green); }
.b-out   { background: rgba(217,85,85,.12); color: var(--red); }
.b-win   { background: rgba(240,180,40,.18); color: var(--accent); }
.b-ok    { background: rgba(106,191,106,.12); color: var(--green); }
.b-pend  { background: rgba(120,120,120,.12); color: var(--dim); }
.inp-wrap { margin-bottom: 12px; }
.inp-lbl { display: block; font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .12em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
input[type=text], input[type=time] { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: .95rem; outline: none; transition: border-color .2s; appearance: none; }
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--dim); }
.flex-row { display: flex; gap: 8px; }
.flex-row input { flex: 1; }
.btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 7px; font-family: 'DM Mono', monospace; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; transition: background .15s, opacity .15s; }
.btn + .btn { margin-top: 8px; }
.btn:disabled { opacity: .4; cursor: default; }
.btn-p { background: var(--accent); color: #000; font-weight: 500; }
.btn-p:hover:not(:disabled) { background: var(--accent2); }
.btn-s { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-s:hover { background: var(--bg4); }
.btn-d { background: rgba(217,85,85,.12); color: var(--red); border: 1px solid rgba(217,85,85,.25); }
.btn-sm { width: auto; padding: 8px 14px; font-size: .65rem; }
.big-clock { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; letter-spacing: .04em; color: var(--accent); text-align: center; line-height: 1; }
.big-clock-lbl { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); text-align: center; margin-top: 4px; }
.winner-banner { background: linear-gradient(135deg, rgba(240,180,40,.12), rgba(240,180,40,.03)); border: 1px solid rgba(240,180,40,.5); border-radius: var(--radius); padding: 20px 16px; text-align: center; margin-bottom: 12px; }
.winner-sub { font-family: 'DM Mono', monospace; font-size: .58rem; letter-spacing: .16em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.winner-name { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; color: var(--accent); letter-spacing: .04em; line-height: 1; }
.winner-pts { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--dim); margin-top: 4px; }
.setup-wrap { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.setup-logo { max-width: 260px; width: 85%; margin-bottom: 8px; }
.setup-tag { font-family: 'DM Mono', monospace; font-size: .62rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); margin-bottom: 36px; }
.setup-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 100%; max-width: 400px; }
.setup-step { font-family: 'DM Mono', monospace; font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.setup-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; margin-bottom: 16px; }
.tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 12px; }
.tag { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-family: 'DM Mono', monospace; font-size: .72rem; display: flex; align-items: center; gap: 6px; }
.tag-x { color: var(--red); cursor: pointer; font-size: 1.1rem; line-height: 1; }
.lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; min-width: 32px; color: var(--dim); }
.lb-rank.first { color: var(--accent); }
.day-chip { display: inline-block; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--dim); margin-bottom: 8px; }
.day-footer { font-family: 'DM Mono', monospace; font-size: .67rem; color: var(--dim); margin-top: 8px; }
.bnd-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: .72rem; }
.bnd-row:last-child { border-bottom: none; }
.bnd-range { color: var(--dim); font-size: .65rem; }
#toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: 'DM Mono', monospace; font-size: .72rem; white-space: nowrap; max-width: 90vw; opacity: 0; transition: opacity .25s, transform .25s; z-index: 9000; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: var(--accent); color: var(--accent); }
#toast.err { border-color: var(--red); color: var(--red); }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--dim); display: inline-block; margin-left: 6px; vertical-align: middle; transition: background .4s; }
.sync-dot.live { background: var(--green); }
.mt8 { margin-top: 8px; } .mt12 { margin-top: 12px; } .mt16 { margin-top: 16px; }
.dim { color: var(--dim); } .mono { font-family: 'DM Mono', monospace; font-size: .75rem; }
.empty { text-align: center; padding: 44px 20px; font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--dim); letter-spacing: .1em; }
.center { text-align: center; } .accent { color: var(--accent); } .red { color: var(--red); }
.loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
.loading-screen img { max-width: 200px; }
.loading-txt { font-family: 'DM Mono', monospace; font-size: .65rem; letter-spacing: .2em; text-transform: uppercase; color: var(--dim); }
</style>

// ── Firebase config ──────────────────────────────────────────────

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const STATE_REF = doc(db, "totowrap", "state");

// ── State ────────────────────────────────────────────────────────
let S = {
  setup: false,
  players: [],
  scores: {},
  days: [],
  today: null
};

let _tab = 'today';

// ── Save to Firestore ────────────────────────────────────────────
async function saveS() {
  _writing = true;
  try {
    await setDoc(STATE_REF, S);
  } catch(e) {
    console.error("Save error:", e);
    toast("Sync error — check connection", "err");
  }
  setTimeout(() => { _writing = false; }, 500);
}

// ── Time utils ───────────────────────────────────────────────────
function toSec(t) { const p = t.split(':').map(Number); return p[0]*3600 + p[1]*60 + (p[2]||0); }
function secToHMS(s) { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; return `${pad(h)}:${pad(m)}:${pad(sec)}`; }
function pad(n) { return String(n).padStart(2,'0'); }
function nowSec() { const d=new Date(); return d.getHours()*3600+d.getMinutes()*60+d.getSeconds(); }
function nowHMS() { const d=new Date(); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; }
function midSec(a,b) { return Math.floor((a+b)/2); }
function sortedGuesses(g) { return [...g].sort((a,b)=>toSec(a.time)-toSec(b.time)); }
function boundaries(guesses) {
  const s=sortedGuesses(guesses);
  return s.slice(0,-1).map((g,i)=>{ const t1=toSec(s[i].time),t2=toSec(s[i+1].time),mid=midSec(t1,t2); return {nameA:s[i].name,nameB:s[i+1].name,sec:mid,str:secToHMS(mid)}; });
}
function eliminated(guesses,curSec) { const s=sortedGuesses(guesses),b=boundaries(guesses),out=new Set(); b.forEach((bd,i)=>{ if(curSec>bd.sec) out.add(s[i].name); }); return out; }
function calcWinner(guesses,wrapHHMM) {
  const wrapSec=toSec(wrapHHMM),s=sortedGuesses(guesses),b=boundaries(guesses);
  let wi=0; b.forEach((bd,i)=>{ if(wrapSec>=bd.sec) wi=i+1; });
  const winner=s[wi]; const points=(wrapHHMM===winner.time.slice(0,5))?3:1;
  return {winner,points};
}

// ── Clock ────────────────────────────────────────────────────────
function startClock() {
  if(_clockInterval) clearInterval(_clockInterval);
  _clockInterval = setInterval(tickClock, 1000);
  tickClock();
}
function tickClock() {
  const t=nowHMS();
  document.querySelectorAll('.js-clock').forEach(el=>el.textContent=t);
  refreshStatusBadges();
}
function refreshStatusBadges() {
  if(!S.today||!S.today.guesses.length||S.today.wrapTime) return;
  const cur=nowSec(), out=eliminated(S.today.guesses,cur);
  S.today.guesses.forEach(g=>{
    const el=document.getElementById('st-'+g.name); if(!el) return;
    if(out.has(g.name)){el.className='badge b-out';el.textContent='OUT';}
    else{el.className='badge b-alive';el.textContent='ALIVE';}
  });
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`show ${type}`;
  clearTimeout(_toastTO);
  _toastTO=setTimeout(()=>el.className='',3000);
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById('app');
  if(IS_ADMIN) {
    if(!S.setup){app.innerHTML=renderSetup();bindSetup();return;}
    app.innerHTML=renderMain();
    startClock();
    bindMain();
  } else {
    renderPlayer(app);
  }
}

function renderPlayer(app) {
  // Not set up yet
  if(!S.setup) {
    app.innerHTML=renderPlayerWaiting();
    return;
  }
  // Set up but no active day
  if(!S.today) {
    app.innerHTML=renderPlayerIdle();
    startClock();
    return;
  }
  // Active day
  app.innerHTML=renderPlayerDay();
  startClock();
}

function renderSetup() {
  const tags=S.players.map(p=>`<div class="tag">${p.name}<span class="tag-x" data-rm="${p.name}">×</span></div>`).join('');
  return `
<div class="setup-wrap">
  <img src="${LOGO_DATA}" alt="TotoWrap" class="setup-logo">
  <div class="setup-tag">The Movie Set Wrap Time Game</div>
  <div class="setup-card">
    <div class="setup-step">First Launch · Setup</div>
    <div class="setup-title">Add Your Players</div>
    ${S.players.length?`<div class="tags" id="ptags">${tags}</div>`:''}
    <div class="flex-row mt8">
      <input type="text" id="pname" placeholder="Player name…" maxlength="20" autocomplete="off">
      <button class="btn btn-s btn-sm" id="add-btn">Add</button>
    </div>
    <div class="mt12">
      <button class="btn btn-p" id="start-btn" ${S.players.length<2?'disabled':''}>Start the Game →</button>
    </div>
    ${S.players.length<2?`<p class="mono dim center mt8">Add at least 2 players to continue</p>`:''}
  </div>
</div>`;
}

function renderMain() {
  const totalDays=S.days.length+(S.today?1:0);
  return `
<div class="hdr">
  <img src="${LOGO_DATA}" alt="TotoWrap" class="hdr-logo">
  <div class="hdr-right">
    <div class="hdr-day">Day ${totalDays||'—'} <span class="sync-dot live" id="sync-dot" title="Live sync"></span></div>
    <div class="hdr-clock js-clock">--:--:--</div>
  </div>
</div>
<nav class="nav">
  <button class="nav-btn ${_tab==='today'?'on':''}" data-tab="today">Today</button>
  <button class="nav-btn ${_tab==='board'?'on':''}" data-tab="board">Board</button>
  <button class="nav-btn ${_tab==='history'?'on':''}" data-tab="history">History</button>
  <button class="nav-btn ${_tab==='settings'?'on':''}" data-tab="settings">⚙</button>
</nav>
<div class="sec ${_tab==='today'?'on':''}" id="tab-today">${renderToday()}</div>
<div class="sec ${_tab==='board'?'on':''}" id="tab-board">${renderBoard()}</div>
<div class="sec ${_tab==='history'?'on':''}" id="tab-history">${renderHistory()}</div>
<div class="sec ${_tab==='settings'?'on':''}" id="tab-settings">${renderSettings()}</div>`;
}

function renderToday() {
  const t=S.today;
  if(!t){
    const last=S.days.length?S.days[S.days.length-1]:null;
    return `<div class="card"><div class="card-lbl">New Day</div><button class="btn btn-p" id="new-day-btn">🎬 Start Today's Game</button></div>${last?`<p class="mono dim center">Last wrap: <span class="accent">${last.wrapTime}</span> — ${last.winner} won</p>`:''}`;
  }
  if(t.wrapTime){
    const sg=sortedGuesses(t.guesses);
    return `
<div class="winner-banner">
  <div class="winner-sub">🎬 Today's Winner</div>
  <div class="winner-name">${t.winner}</div>
  <div class="winner-pts">+${t.points} point${t.points>1?'s':''} · Wrap at <span class="accent">${t.wrapTime}</span></div>
</div>
<div class="card"><div class="card-lbl">Results</div>
${sg.map(g=>`<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time}</div><div class="badge ${g.name===t.winner?'b-win':'b-out'}">${g.name===t.winner?`+${t.points}pt`:'—'}</div></div>`).join('')}
</div>
<button class="btn btn-p" id="new-day-btn">Start Next Day →</button>`;
  }
  const guessed=t.guesses.length, total=S.players.length, allIn=guessed===total;
  if(!allIn){
    return `<div class="card"><div class="card-lbl">Collecting Guesses — ${guessed}/${total}</div>
${S.players.map(p=>{
  const g=t.guesses.find(x=>x.name===p.name);
  if(g) return `<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time}</div><div class="badge b-ok">✓</div></div>`;
  return `<div class="row" id="grow-${p.name}"><div class="row-name">${p.name}</div><input type="time" id="gi-${p.name}" style="width:118px;padding:7px 10px;font-size:.88rem;"><button class="btn btn-p btn-sm js-guess" data-name="${p.name}">OK</button></div>`;
}).join('')}
</div>`;
  }
  const cur=nowSec(), out=eliminated(t.guesses,cur), sg=sortedGuesses(t.guesses), bnds=boundaries(t.guesses);
  return `
<div class="card"><div class="big-clock js-clock">--:--:--</div><div class="big-clock-lbl">Live Time</div></div>
<div class="card"><div class="card-lbl">Player Status</div>
${sg.map(g=>`<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time}</div><div class="badge ${out.has(g.name)?'b-out':'b-alive'}" id="st-${g.name}">${out.has(g.name)?'OUT':'ALIVE'}</div></div>`).join('')}
</div>
<div class="card"><div class="card-lbl">Territory Boundaries</div>
${sg.map((g,i)=>{const lo=i===0?'00:00:00':bnds[i-1].str,hi=i===sg.length-1?'23:59:59':bnds[i].str;return `<div class="bnd-row"><span>${g.name}</span><span class="bnd-range">${lo} → ${hi}</span></div>`;}).join('')}
<p class="mono dim mt8" style="font-size:.6rem">Boundary belongs to the later-guessing player</p>
</div>
<div class="card"><div class="card-lbl">Input Official Wrap Time</div>
<div class="inp-wrap"><label class="inp-lbl">Wrap Time (HH:MM)</label><input type="time" id="wrap-inp"></div>
<button class="btn btn-p" id="wrap-btn">Confirm Wrap ✓</button>
</div>`;
}

function renderBoard() {
  const pl=[...S.players].sort((a,b)=>(S.scores[b.name]||0)-(S.scores[a.name]||0));
  if(!pl.length) return '<div class="empty">No players yet</div>';
  return `<div class="card"><div class="card-lbl">Standings</div>
${pl.map((p,i)=>`<div class="row"><div class="lb-rank ${i===0?'first':''}">${i+1}</div><div class="row-name">${p.name}</div><div class="row-pts accent">${S.scores[p.name]||0} <span class="mono dim" style="font-size:.65rem">pts</span></div></div>`).join('')}
</div><button class="btn btn-s" id="export-btn">Export CSV</button>`;
}

function renderHistory() {
  let all=[...S.days];
  if(S.today&&S.today.wrapTime) all.push(S.today);
  if(!all.length) return '<div class="empty">No completed days yet</div>';
  return [...all].reverse().map((d,i)=>{
    const num=all.length-i, sg=sortedGuesses(d.guesses);
    return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div class="day-chip">Day ${num}</div><div class="mono dim">${d.date}</div></div>
${sg.map(g=>`<div class="row"><div class="row-name">${g.name}</div><div class="row-time">${g.time}</div><div class="badge ${g.name===d.winner?'b-win':'b-out'}">${g.name===d.winner?`+${d.points}pt`:'—'}</div></div>`).join('')}
<div class="day-footer">Wrap: <span class="accent">${d.wrapTime}</span> · Winner: <span class="accent">${d.winner}</span></div></div>`;
  }).join('');
}

function renderSettings() {
  return `<div class="card"><div class="card-lbl">Player Roster</div>
${S.players.map(p=>`<div class="row"><div class="row-name">${p.name}</div><div class="mono dim">${S.scores[p.name]||0} pts</div></div>`).join('')}
</div>
<div class="card"><div class="card-lbl">Danger Zone</div>
<p class="mono dim mt8" style="margin-bottom:12px">This will erase all data permanently for everyone.</p>
<button class="btn btn-d" id="reset-btn">Reset Entire Game</button>
</div>`;
}

// ── Event binding ─────────────────────────────────────────────────
function bindSetup() {
  document.getElementById('add-btn')?.addEventListener('click', addPlayer);
  document.getElementById('pname')?.addEventListener('keydown', e=>{if(e.key==='Enter') addPlayer();});
  document.getElementById('start-btn')?.addEventListener('click', finishSetup);
  document.querySelectorAll('.tag-x').forEach(el=>el.addEventListener('click',()=>removePlayer(el.dataset.rm)));
}
function bindMain() {
  document.querySelectorAll('.nav-btn').forEach(btn=>btn.addEventListener('click',()=>{_tab=btn.dataset.tab;render();}));
  document.getElementById('new-day-btn')?.addEventListener('click', startDay);
  document.querySelectorAll('.js-guess').forEach(btn=>btn.addEventListener('click',()=>submitGuess(btn.dataset.name)));
  document.getElementById('wrap-btn')?.addEventListener('click', submitWrap);
  document.getElementById('export-btn')?.addEventListener('click', exportCSV);
  document.getElementById('reset-btn')?.addEventListener('click',()=>{
    if(confirm('Reset the entire game for everyone? This cannot be undone.')){
      S={setup:false,players:[],scores:{},days:[],today:null};
      saveS(); render();
    }
  });
}

// ── Actions ───────────────────────────────────────────────────────
function addPlayer() {
  const inp=document.getElementById('pname'); const name=inp.value.trim(); if(!name) return;
  if(S.players.find(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Player already exists','err');return;}
  S.players.push({name}); S.scores[name]=0;
  inp.value=''; saveS(); render(); document.getElementById('pname')?.focus();
}
function removePlayer(name) { S.players=S.players.filter(p=>p.name!==name); delete S.scores[name]; saveS(); render(); }
function finishSetup() { if(S.players.length<2) return; S.setup=true; saveS(); render(); }

function startDay() {
  if(S.today&&S.today.wrapTime){
    const alreadySaved=S.days.find(d=>d.date===S.today.date&&d.wrapTime===S.today.wrapTime);
    if(!alreadySaved) S.days.push({...S.today});
  }
  S.today={date:new Date().toLocaleDateString('en-GB'),guesses:[],wrapTime:null,winner:null,points:null};
  saveS(); render();
}

function submitGuess(name) {
  const inp=document.getElementById(`gi-${name}`); if(!inp||!inp.value){toast('Enter a time first','err');return;}
  const hhmm=inp.value;
  const dup=S.today.guesses.find(g=>g.time.slice(0,5)===hhmm);
  if(dup){
    toast(`${dup.name} already guessed ${hhmm} — add seconds below`,'err');
    const row=document.getElementById(`grow-${name}`);
    if(row){
      row.innerHTML=`<div class="row-name">${name}</div><input type="text" id="gi-ss-${name}" placeholder="HH:MM:SS" value="${hhmm}:" maxlength="8" style="width:128px;padding:7px 10px;font-size:.88rem;"><button class="btn btn-p btn-sm js-guess-ss" data-name="${name}">OK</button>`;
      row.querySelector('.js-guess-ss').addEventListener('click',()=>submitGuessWithSS(name));
      document.getElementById(`gi-ss-${name}`)?.focus();
    }
    return;
  }
  S.today.guesses.push({name,time:hhmm}); saveS(); render();
}

function submitGuessWithSS(name) {
  const inp=document.getElementById(`gi-ss-${name}`); const val=(inp?.value||'').trim();
  if(!/^\d{2}:\d{2}:\d{2}$/.test(val)){toast('Use format HH:MM:SS','err');return;}
  const parts=val.split(':').map(Number); if(parts[1]>59||parts[2]>59){toast('Invalid time','err');return;}
  const dup=S.today.guesses.find(g=>g.time===val); if(dup){toast(`${dup.name} already has ${val}`,'err');return;}
  S.today.guesses.push({name,time:val}); saveS(); render();
}

function submitWrap() {
  const inp=document.getElementById('wrap-inp'); if(!inp?.value){toast('Enter the wrap time','err');return;}
  const wrapHHMM=inp.value;
  const {winner,points}=calcWinner(S.today.guesses,wrapHHMM);
  S.today.wrapTime=wrapHHMM; S.today.winner=winner.name; S.today.points=points;
  S.scores[winner.name]=(S.scores[winner.name]||0)+points;
  saveS(); toast(`${winner.name} wins +${points} pt${points>1?'s':''}! 🎬`,'ok'); render();
}

function exportCSV() {
  const rows=[['Rank','Player','Points']];
  [...S.players].sort((a,b)=>(S.scores[b.name]||0)-(S.scores[a.name]||0)).forEach((p,i)=>rows.push([i+1,p.name,S.scores[p.name]||0]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='totowrap_scores.csv'; a.click();
}

// ── Real-time Firestore listener ──────────────────────────────────
onSnapshot(STATE_REF, (snap) => {
  if(_writing) return; // skip echo-back from our own write
  if(snap.exists()) {
    S = snap.data();
  }
  render();
}, (err) => {
  console.error("Firestore error:", err);
  const dot = document.getElementById('sync-dot');
  if(dot) { dot.classList.remove('live'); dot.title = 'Sync error'; }
});
</script>
</body>
</html>
